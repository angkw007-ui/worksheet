<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학교업무별 프로세스</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --ink:#1f2430; --paper:#f7f5f0; --paper-deep:#efebe2; --line:#d8d2c4;
  --seal:#a8333f; --seal-soft:#f3e1e1;
  --pine:#3c5a4e; --pine-soft:#e3ebe6;
  --gold:#a3793b; --gold-soft:#f1e7d6;
  --sky:#2c5f8a;  --sky-soft:#e0eaf4;
  --violet:#5a4e7c; --violet-soft:#ece9f4;
  --muted:#7c7568; --white:#fff;
  --radius:10px;
  --shadow:0 1px 3px rgba(31,36,48,.07),0 4px 14px rgba(31,36,48,.05);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{font-family:'Pretendard Variable','Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:var(--paper);color:var(--ink);font-size:14px;line-height:1.55;}

/* ── 전체 레이아웃 ── */
.app{display:grid;grid-template-columns:210px 1fr;min-height:100vh;}

/* ── 업무분야 사이드바 ── */
.sidebar{
  background:var(--paper-deep);border-right:1px solid var(--line);
  padding:18px 12px 20px;display:flex;flex-direction:column;gap:14px;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.brand{padding:0 4px;}
.brand .mark{width:9px;height:9px;border-radius:2px;background:var(--seal);
  display:inline-block;transform:rotate(45deg);margin-right:6px;}
.brand h1{font-size:13.5px;font-weight:800;margin:0;display:inline;}
.brand small{display:block;color:var(--muted);font-size:11px;margin-top:5px;
  cursor:pointer;border-bottom:1px dashed transparent;width:fit-content;}
.brand small:hover{color:var(--seal);border-bottom-color:var(--seal);}

.cat-list{display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto;}
.cat-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;
  cursor:pointer;font-size:13px;font-weight:500;transition:background .12s;border:1px solid transparent;}
.cat-item:hover{background:rgba(31,36,48,.04);}
.cat-item.active{background:var(--white);border-color:var(--line);box-shadow:var(--shadow);}
.cat-dot{width:6px;height:6px;border-radius:50%;background:var(--seal);flex-shrink:0;}
.cat-item .owner{margin-left:auto;font-size:10px;color:var(--muted);}

.sidebar-foot{padding-top:10px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:6px;}
.btn-ghost{background:none;border:1px dashed var(--line);color:var(--muted);
  padding:8px 10px;border-radius:7px;font-size:12px;cursor:pointer;text-align:left;width:100%;font-family:inherit;}
.btn-ghost:hover{border-color:var(--seal);color:var(--seal);}

/* 관리자 로그인 패널 */
.admin-panel{
  background:var(--white);border:1px solid var(--line);border-radius:8px;padding:10px;
  display:flex;flex-direction:column;gap:6px;
}
.admin-status{display:flex;align-items:center;gap:6px;font-size:11px;}
.admin-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.admin-dot.on{background:#2e9e5b;}
.admin-name{font-weight:600;color:var(--ink);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.admin-sub{color:var(--muted);}
.btn-admin-login{
  background:var(--seal);color:#fff;border:none;border-radius:6px;
  padding:6px 10px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;
}
.btn-admin-login:hover{opacity:.88;}
.btn-admin-logout{
  background:none;border:1px solid var(--line);border-radius:6px;color:var(--muted);
  padding:5px 10px;font-size:11px;cursor:pointer;font-family:inherit;width:100%;
}
.btn-admin-logout:hover{border-color:var(--seal);color:var(--seal);}

/* ── 메인 ── */
.main{display:flex;min-height:100vh;overflow:hidden;}

/* 단계 세로 네비 */
.stage-nav{
  width:128px;flex-shrink:0;background:var(--white);border-right:1px solid var(--line);
  padding:18px 0;display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.stage-nav-header{font-size:10px;font-weight:700;color:var(--muted);
  letter-spacing:.5px;padding:0 13px 10px;text-transform:uppercase;}
.stage-nav-item{
  display:flex;align-items:center;gap:7px;padding:9px 13px;
  cursor:pointer;font-size:12.5px;font-weight:600;color:var(--muted);
  border-left:3px solid transparent;transition:all .12s;
}
.stage-nav-item:hover{color:var(--ink);background:var(--paper);}
.stage-nav-item.active{color:var(--seal);border-left-color:var(--seal);background:var(--seal-soft);}
.stage-num{width:19px;height:19px;border-radius:50%;background:var(--paper-deep);
  font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:var(--muted);}
.stage-nav-item.active .stage-num{background:var(--seal);color:#fff;}
.stage-nav-foot{margin-top:auto;padding:10px 13px 0;border-top:1px solid var(--line);}
.stage-manage-btn{font-size:11px;color:var(--muted);background:none;border:1px dashed var(--line);
  border-radius:6px;padding:6px 8px;cursor:pointer;width:100%;font-family:inherit;text-align:left;}
.stage-manage-btn:hover{border-color:var(--seal);color:var(--seal);}

/* 콘텐츠 */
.content-area{flex:1;overflow:auto;padding:18px 16px 40px;}

.cat-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:12px;}
.cat-header h2{font-size:19px;font-weight:800;margin:0 0 2px;letter-spacing:-.3px;}
.cat-header p{margin:0;color:var(--muted);font-size:12px;}
.cat-actions{display:flex;gap:6px;flex-shrink:0;}
.icon-btn{background:var(--white);border:1px solid var(--line);border-radius:7px;
  padding:5px 11px;font-size:11.5px;cursor:pointer;font-family:inherit;}
.icon-btn:hover{border-color:var(--seal);color:var(--seal);}
.icon-btn[data-admin-only]{display:none;}
.is-admin .icon-btn[data-admin-only]{display:inline-block;}

/* 단계 배너 */
.stage-banner{
  display:flex;align-items:center;gap:10px;
  background:var(--seal-soft);border:1px solid rgba(168,51,63,.15);
  border-radius:9px;padding:9px 15px;margin-bottom:14px;
}
.stage-banner .badge{background:var(--seal);color:#fff;font-size:11px;font-weight:700;
  padding:2px 10px;border-radius:999px;flex-shrink:0;}
.stage-banner .sname{font-size:13.5px;font-weight:700;color:var(--seal);}
.stage-banner .hint{font-size:11px;color:var(--muted);margin-left:auto;}

/* ── 4열 그리드 ── */
.col-grid{display:grid;grid-template-columns:repeat(4,minmax(210px,1fr));gap:12px;min-width:800px;}
.col-card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);
  display:flex;flex-direction:column;overflow:hidden;}
.col-head{
  padding:10px 13px;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--line);letter-spacing:.1px;
}
.col-head .col-icon{font-size:14px;margin-right:5px;}
.col-head .add-btn{background:none;border:none;font-size:18px;cursor:pointer;
  line-height:1;color:inherit;opacity:.5;padding:0 2px;display:none;}
.col-head .add-btn:hover{opacity:1;}
.is-admin .col-head .add-btn{display:block;}
.col-body{padding:10px;flex:1;display:flex;flex-direction:column;gap:6px;min-height:140px;}

/* 열 색상 */
.col-task .col-head{background:rgba(168,51,63,.07);color:var(--seal);}
.col-doc  .col-head{background:rgba(60,90,78,.07); color:var(--pine);}
.col-law  .col-head{background:rgba(44,95,138,.07);color:var(--sky);}
.col-memo .col-head{background:rgba(90,78,124,.07);color:var(--violet);}

/* ── 해야할일 ── */
.task-item{
  display:flex;align-items:flex-start;gap:8px;padding:9px 10px;
  border-radius:7px;border:1px solid var(--line);background:var(--paper);
  transition:box-shadow .1s;
}
.task-item:hover{box-shadow:0 2px 8px rgba(0,0,0,.06);}
.task-item.done{opacity:.45;}
.task-check{
  width:16px;height:16px;border-radius:4px;border:1.5px solid var(--line);
  flex-shrink:0;margin-top:2px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:10px;
}
.task-check.checked{background:var(--pine);border-color:var(--pine);color:#fff;}
.task-body{flex:1;min-width:0;}
.task-content{font-size:12.5px;font-weight:500;line-height:1.45;}
.task-item.done .task-content{text-decoration:line-through;}
.task-note{font-size:10.5px;color:var(--muted);margin-top:2px;}
/* 수정/삭제 버튼 — 누구나 완료 체크, 수정·삭제는 관리자만 */
.task-actions{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:opacity .1s;}
.task-item:hover .task-actions{opacity:1;}
.task-act-btn{background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:11px;padding:3px 5px;border-radius:4px;}
.task-act-btn:hover{background:var(--paper-deep);color:var(--ink);}
.task-act-btn.del:hover{color:var(--seal);}
.is-admin .task-actions{display:flex;}

/* ── 문서 카드 공통 ── */
.doc-item{
  padding:9px 11px;border-radius:7px;border:1px solid var(--line);
  background:var(--paper);font-size:12.5px;display:flex;flex-direction:column;gap:4px;
}
.doc-item:hover{box-shadow:0 2px 8px rgba(0,0,0,.06);}
.doc-item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:4px;}
.doc-title{font-weight:600;line-height:1.4;flex:1;}
.doc-sub{font-size:10.5px;color:var(--muted);}
.doc-foot{display:flex;align-items:center;justify-content:space-between;margin-top:2px;}

/* 다운로드 버튼 — 누구나 */
.dl-btn{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:600;padding:4px 9px;border-radius:5px;
  text-decoration:none;border:1px solid;cursor:pointer;background:none;font-family:inherit;
}
.col-doc  .dl-btn{color:var(--pine);border-color:var(--pine);background:var(--pine-soft);}
.col-law  .dl-btn{color:var(--sky); border-color:var(--sky); background:var(--sky-soft);}
.dl-btn:hover{opacity:.8;}

/* 다운로드 버튼 — 누구나 항상 표시 (관리자 여부 무관) */
.dl-btn{
  display:inline-flex !important;
  visibility:visible !important;
  align-items:center;gap:5px;
  font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:6px;
  text-decoration:none;border:1.5px solid;cursor:pointer;
  background:none;font-family:inherit;margin-top:4px;
}
.col-doc .dl-btn{color:var(--pine);border-color:var(--pine);background:var(--pine-soft);}
.col-law .dl-btn{color:var(--sky); border-color:var(--sky); background:var(--sky-soft);}
.dl-btn:hover{opacity:.75;}

/* 삭제 버튼 — 관리자만 */
.item-del{
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:12px;padding:2px 5px;border-radius:4px;
  display:none;flex-shrink:0;
}
.item-del:hover{color:var(--seal);}
.is-admin .item-del{display:block;}
.is-admin .doc-item:hover .item-del{opacity:1;}
.type-tag{display:inline-block;font-size:9.5px;font-weight:700;padding:2px 7px;
  border-radius:4px;margin-right:4px;vertical-align:middle;}
.type-tag.결재예시{background:var(--pine-soft);color:var(--pine);}
.type-tag.서식{background:var(--gold-soft);color:var(--gold);}

/* ── 메모 열 ── */
.memo-item{
  padding:9px 11px;border-radius:7px;border:1px solid var(--line);
  background:var(--paper);font-size:12.5px;
}
.memo-item:hover{box-shadow:0 2px 8px rgba(0,0,0,.06);}
.memo-head{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;}
.memo-content{font-size:12.5px;line-height:1.5;white-space:pre-wrap;margin-top:4px;word-break:break-all;}
.memo-content a{color:var(--sky);text-decoration:underline;}
.memo-content a:hover{opacity:.75;}
.memo-meta{font-size:10.5px;color:var(--muted);margin-top:4px;}
.memo-actions{display:flex;gap:2px;flex-shrink:0;}
.memo-act-btn{background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:11px;padding:3px 5px;border-radius:4px;display:none;}
.is-admin .memo-act-btn{display:block;}
.memo-act-btn:hover{background:var(--paper-deep);color:var(--ink);}
.memo-act-btn.del:hover{color:var(--seal);}

/* 빈 상태 */
.empty-col{font-size:11.5px;color:var(--muted);text-align:center;padding:18px 8px;line-height:1.6;}
.empty-main{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:60vh;color:var(--muted);font-size:14px;gap:8px;}
.empty-main .icon{font-size:36px;opacity:.3;}

/* 로딩 */
.loading-text{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;padding:8px 0;}
.spinner{width:12px;height:12px;border:2px solid var(--line);border-top-color:var(--seal);
  border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* 버튼 */
.btn-primary{background:var(--ink);color:#fff;border:none;border-radius:7px;
  padding:8px 14px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-primary.seal{background:var(--seal);}
.btn-primary:hover{opacity:.88;}
.btn-secondary{background:var(--white);border:1px solid var(--line);border-radius:7px;
  padding:8px 14px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--ink);}
.btn-secondary:hover{border-color:var(--ink);}
.bottom-toolbar{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
/* 관리자 전용 버튼 */
.admin-only-btn{display:none;}
.is-admin .admin-only-btn{display:inline-flex;}

/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(31,36,48,.45);
  display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:13px;padding:24px 26px;
  max-width:480px;width:100%;max-height:86vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal h3{margin:0 0 3px;font-size:16px;}
.modal .sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
.modal-actions{display:flex;justify-content:flex-end;gap:7px;margin-top:8px;}
.field{margin-bottom:12px;}
label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;}
input[type=text],input[type=password],textarea,select{
  width:100%;padding:8px 11px;border:1px solid var(--line);border-radius:7px;
  font-size:13px;font-family:inherit;background:#fff;color:var(--ink);}
textarea{resize:vertical;min-height:76px;}
.hint{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5;}

/* 파일 드롭존 */
.file-drop{
  border:2px dashed var(--line);border-radius:9px;padding:18px 14px;
  text-align:center;font-size:12.5px;color:var(--muted);cursor:pointer;
  background:var(--paper);transition:all .15s;
}
.file-drop:hover,.file-drop.drag-over{border-color:var(--seal);background:var(--seal-soft);color:var(--seal);}
.file-drop.has-file{border-color:var(--pine);background:var(--pine-soft);color:var(--pine);}
.drop-icon{font-size:24px;margin-bottom:5px;}
.drop-hint{font-size:11px;color:var(--muted);margin-top:4px;}
.file-drop.has-file .drop-hint{color:var(--pine);}

/* AI 드롭존 */
.ai-drop-zone{border:2px dashed var(--line);border-radius:9px;padding:28px 18px;
  text-align:center;cursor:pointer;background:var(--paper);transition:all .15s;}
.ai-drop-zone:hover,.ai-drop-zone.drag-over{border-color:var(--seal);background:var(--seal-soft);}
.ai-drop-zone.has-file{border-color:var(--pine);background:var(--pine-soft);}
.dz-icon{font-size:30px;margin-bottom:8px;}
.dz-title{font-size:13px;font-weight:600;margin-bottom:4px;}
.dz-sub{font-size:11.5px;color:var(--muted);}
.ai-drop-zone.has-file .dz-sub{color:var(--pine);}

.ai-result-list{display:flex;flex-direction:column;gap:5px;margin:10px 0;max-height:240px;overflow-y:auto;}
.ai-result-item{display:flex;gap:7px;align-items:flex-start;background:var(--paper);
  border-radius:7px;padding:8px 10px;font-size:12.5px;}
.ai-result-item input[type=checkbox]{margin-top:2px;}

/* 단계 관리 */
.stage-edit-row{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid var(--paper);}
.stage-edit-row input{flex:1;}
.stage-edit-row button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;}
.stage-edit-row button:hover{color:var(--seal);}

/* 토스트 */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;padding:10px 18px;border-radius:7px;
  font-size:13px;z-index:200;opacity:0;transition:opacity .22s;pointer-events:none;}
.toast.show{opacity:1;}

@media(max-width:900px){
  .app{grid-template-columns:1fr;}
  .sidebar{height:auto;position:sticky;top:0;z-index:10;flex-direction:row;
    overflow-x:auto;padding:10px 12px;border-right:none;border-bottom:1px solid var(--line);}
  .cat-list{flex-direction:row;flex:none;}
  .sidebar-foot{display:none;}
  .stage-nav{width:100%;height:auto;position:static;flex-direction:row;
    overflow-x:auto;padding:10px 0;border-right:none;border-bottom:1px solid var(--line);}
  .stage-nav-header,.stage-nav-foot{display:none;}
  .stage-nav-item{border-left:none;border-bottom:3px solid transparent;padding:6px 12px;}
  .stage-nav-item.active{border-bottom-color:var(--seal);border-left:none;background:none;}
  .col-grid{grid-template-columns:repeat(4,minmax(180px,1fr));}
}
</style>
</head>
<body>

<div class="app">
  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="brand">
      <span class="mark"></span><h1>학교업무별 프로세스</h1>
      <small id="schoolNameLabel">학교명 설정</small>
    </div>
    <div class="cat-list" id="catList"></div>
    <div class="sidebar-foot">
      <button class="btn-ghost admin-only-btn" id="addCategoryBtn">+ 업무분야 추가</button>

      <!-- 관리자 로그인/로그아웃 패널 -->
      <div class="admin-panel">
        <div class="admin-status">
          <span class="admin-dot" id="adminDot"></span>
          <span class="admin-name" id="adminName">일반 사용자</span>
        </div>
        <button class="btn-admin-login" id="adminLoginBtn">관리자 로그인</button>
        <button class="btn-admin-logout" id="adminLogoutBtn" style="display:none;">로그아웃</button>
      </div>
    </div>
  </aside>

  <!-- 메인 -->
  <div class="main" id="mainArea">
    <div class="empty-main" id="emptyMain">
      <div class="icon">📋</div>
      <div>왼쪽에서 업무분야를 선택하세요.</div>
    </div>

    <!-- 단계 세로 네비 -->
    <nav class="stage-nav" id="stageNav" style="display:none;">
      <div class="stage-nav-header">진행 단계</div>
      <div id="stageNavList"></div>
      <div class="stage-nav-foot">
        <button class="stage-manage-btn admin-only-btn" id="manageStageBtn">+ 단계 관리</button>
      </div>
    </nav>

    <!-- 콘텐츠 -->
    <div class="content-area" id="contentArea" style="display:none;">
      <div class="cat-header">
        <div>
          <h2 id="catTitle">-</h2>
          <p id="catDesc"></p>
        </div>
        <div class="cat-actions">
          <button class="icon-btn admin-only-btn" id="editCategoryBtn">수정</button>
          <button class="icon-btn admin-only-btn" id="deleteCategoryBtn">삭제</button>
        </div>
      </div>

      <!-- 단계 배너 -->
      <div class="stage-banner" id="stageBanner">
        <span class="badge" id="stageBannerNum">-</span>

const API_URL = 'https://script.google.com/macros/s/AKfycbyRL9VSd57QsTlXvSGL1CqcFsH859noxR83ItSdw7jDP806OI51lBTPGUE7zJnxno6L/exec';

// 실제 배포 시 이 목록을 원하는 이메일+비밀번호 쌍으로 수정하세요.
const ADMIN_ACCOUNTS = [

/* ── JSONP API ── */
let _seq=0;
function api(action, payload={}){
  return new Promise((resolve,reject)=>{
    const cb='_cb_'+(++_seq)+'_'+Date.now();
    const timer=setTimeout(()=>{cleanup();reject(new Error('요청 시간 초과'));},20000);
    function cleanup(){
      clearTimeout(timer);delete window[cb];
      const el=document.getElementById(cb);if(el)el.parentNode.removeChild(el);
    }
    window[cb]=data=>{cleanup();data.ok?resolve(data):reject(new Error(data.error||'오류'));};
    const s=document.createElement('script');
    s.id=cb;
    s.src=API_URL+'?'+new URLSearchParams({action,payload:JSON.stringify(payload),callback:cb});
    s.onerror=()=>{cleanup();reject(new Error('스크립트 로드 실패'));};
    document.head.appendChild(s);
  });
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}
function esc(s){
  return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

}

/* ── 사이드바 ── */
function renderCategoryList(){
  const el=document.getElementById('catList');
  el.innerHTML=STATE.categories.map(c=>`
    <div class="cat-item ${c.id===STATE.currentCategoryId?'active':''}" data-id="${c.id}">
      <span class="cat-dot"></span>${esc(c.name)}
      <span class="owner">${esc(c.owner||'')}</span>
    </div>`).join('');
  el.querySelectorAll('.cat-item').forEach(e=>e.addEventListener('click',()=>selectCategory(e.dataset.id)));
}

function selectCategory(id){
  STATE.currentCategoryId=id;STATE.currentStageId=null;
  renderCategoryList();
  const cat=STATE.categories.find(c=>c.id===id);if(!cat)return;
  document.getElementById('emptyMain').style.display='none';
  document.getElementById('stageNav').style.display='';
  document.getElementById('contentArea').style.display='';
  document.getElementById('catTitle').textContent=cat.name;
  document.getElementById('catDesc').textContent=cat.desc||'';
  renderStageNav();
}

/* ── 단계 세로 네비 ── */
function renderStageNav(){
  const stages=STATE.stagesByCategory[STATE.currentCategoryId]||[];
  const list=document.getElementById('stageNavList');
  if(!stages.length){
    list.innerHTML='<div style="padding:10px 13px;font-size:11px;color:var(--muted);">단계가 없습니다.<br>단계 관리에서 추가하세요.</div>';
    clearGrid();updateBanner(null,[]);return;
  }
  if(!STATE.currentStageId||!stages.find(s=>s.id===STATE.currentStageId))
    STATE.currentStageId=stages[0].id;
  list.innerHTML=stages.map((s,i)=>`
    <div class="stage-nav-item ${s.id===STATE.currentStageId?'active':''}" data-id="${s.id}">
      <span class="stage-num">${i+1}</span>${esc(s.name)}
    </div>`).join('');
  list.querySelectorAll('.stage-nav-item').forEach(e=>e.addEventListener('click',()=>{
    STATE.currentStageId=e.dataset.id;renderStageNav();
  }));
  updateBanner(STATE.currentStageId,stages);
  loadAllColumns();
}

function updateBanner(id,stages){
  const idx=stages.findIndex(s=>s.id===id);const s=stages[idx];
  document.getElementById('stageBannerNum').textContent=idx>=0?idx+1:'-';
  document.getElementById('stageBannerName').textContent=s?s.name:'단계를 선택하세요';
  document.getElementById('stageBannerHint').textContent=s?`총 ${stages.length}단계 중 ${idx+1}번째`:'← 단계를 추가하세요';

/* ── ① 해야할일 (수정·삭제 관리자만, 완료체크 누구나) ── */
async function loadTasks(){
  const el=document.getElementById('taskList');
  try{
    const {tasks}=await api('getTasks',{stageId:STATE.currentStageId});
    if(!tasks.length){el.innerHTML='<div class="empty-col">할일이 없습니다</div>';return;}
    el.innerHTML=tasks.map(t=>`
      <div class="task-item ${t.done?'done':''}" data-id="${t.id}">
        <div class="task-check ${t.done?'checked':''}">${t.done?'✓':''}</div>
        <div class="task-body">
          <div class="task-content">${esc(t.content)}</div>
          ${t.note?`<div class="task-note">📌 ${esc(t.note)}</div>`:''}
          ${t.owner?`<div class="task-note">👤 ${esc(t.owner)}</div>`:''}
        </div>
        <div class="task-actions">
          <button class="task-act-btn" data-action="edit" title="수정">✏️</button>
          <button class="task-act-btn del" data-action="delete" title="삭제">✕</button>
        </div>
      </div>`).join('');

    // 완료 체크 — 누구나
    el.querySelectorAll('.task-check').forEach(c=>c.addEventListener('click',async()=>{
      await api('toggleTaskDone',{id:c.closest('.task-item').dataset.id});loadTasks();
    }));
    // 수정 — 관리자만
    el.querySelectorAll('[data-action="edit"]').forEach(b=>b.addEventListener('click',()=>{
      if(!STATE.isAdmin)return toast('관리자만 수정할 수 있습니다.');
      const item=b.closest('.task-item');
      const content=item.querySelector('.task-content').textContent;
      const note=item.querySelector('.task-note')?.textContent.replace('📌 ','').replace('👤 ','');
      openModal(`
        <h3>할일 수정</h3>
        <div class="field"><label>할일 내용</label><textarea id="m-content">${esc(content)}</textarea></div>
        <div class="field"><label>비고</label><input type="text" id="m-note" value="${esc(note||'')}"></div>
        <div class="modal-actions">
          <button class="btn-secondary" onclick="closeModal()">취소</button>
          <button class="btn-primary seal" id="m-submit">저장</button>
        </div>`);
      document.getElementById('m-submit').addEventListener('click',async()=>{
        await api('updateTask',{id:item.dataset.id,
          content:document.getElementById('m-content').value.trim(),
          note:document.getElementById('m-note').value.trim()});
        closeModal();toast('수정되었습니다.');loadTasks();
      });
    }));
    // 삭제 — 관리자만
    el.querySelectorAll('[data-action="delete"]').forEach(b=>b.addEventListener('click',async()=>{
      if(!STATE.isAdmin)return toast('관리자만 삭제할 수 있습니다.');
      if(!confirm('삭제할까요?'))return;
      await api('deleteTask',{id:b.closest('.task-item').dataset.id});loadTasks();
    }));
  }catch(e){el.innerHTML=`<div class="empty-col">오류: ${esc(e.message)}</div>`;}
}

document.getElementById('addTaskBtn').addEventListener('click',()=>{

/* URL을 클릭 가능한 링크로 자동 변환 */
function linkify(text){
  const escaped=esc(text);
  return escaped.replace(
    /(https?:\/\/[^\s<>"]+)/g,
    '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>'
  );
}

async function moveStage(id,dir){

  if(swap<0||swap>=stages.length)return;
  [stages[idx],stages[swap]]=[stages[swap],stages[idx]];
  await api('reorderStages',{orderedIds:stages.map(s=>s.id)});
  await refreshStages();document.getElementById('manageStageBtn').click();
}

function readFileAsText(file){
  return new Promise((resolve,reject)=>{
    const name=file.name.toLowerCase();const reader=new FileReader();
    if(name.endsWith('.txt')||name.endsWith('.md')||name.endsWith('.csv')){
      reader.onload=e=>resolve(e.target.result);
      reader.onerror=()=>reject(new Error('파일 읽기 실패'));
      reader.readAsText(file,'utf-8');return;
    }
    reader.onload=e=>{
      const bytes=new Uint8Array(e.target.result);
      if(name.endsWith('.docx')||name.endsWith('.hwpx')){
        try{const t=extractZipXmlText(bytes);if(t.trim())return resolve(t);}catch(err){}
      }
      if(name.endsWith('.pdf')){
        try{
          const raw=new TextDecoder('latin1').decode(bytes);
          const chunks=[];const re=/BT[\s\S]*?ET/g;let m;
          while((m=re.exec(raw))!==null){
            const tj=/\(([^)]*)\)\s*T[jJ]/g;let tj_m;
            while((tj_m=tj.exec(m[0]))!==null)chunks.push(tj_m[1]);
          }
          if(chunks.length>0)return resolve(chunks.join(' '));
        }catch(err){}
      }
      try{
        const text=new TextDecoder('utf-8',{fatal:false}).decode(bytes);
        const p=text.replace(/[^\uAC00-\uD7A3\u1100-\u11FF\w\s.,!?:;\-()]/g,' ').replace(/\s+/g,' ').trim();
        if(p.length>50)return resolve(p);
      }catch(err){}
      reject(new Error('이 파일에서 텍스트를 추출하기 어렵습니다. txt 파일로 저장 후 다시 시도해주세요.'));
    };
    reader.onerror=()=>reject(new Error('파일 읽기 실패'));
    reader.readAsArrayBuffer(file);
  });
}
function extractZipXmlText(bytes){
  const sig=[0x50,0x4B,0x03,0x04];let pos=0;const texts=[];
  while(pos<bytes.length-30){
    if(bytes[pos]===sig[0]&&bytes[pos+1]===sig[1]&&bytes[pos+2]===sig[2]&&bytes[pos+3]===sig[3]){
      const fnLen=bytes[pos+26]|(bytes[pos+27]<<8);
      const extraLen=bytes[pos+28]|(bytes[pos+29]<<8);
      const compMethod=bytes[pos+8]|(bytes[pos+9]<<8);
      const compSize=bytes[pos+18]|(bytes[pos+19]<<8)|(bytes[pos+20]<<16)|(bytes[pos+21]<<24);
      const fn=new TextDecoder().decode(bytes.slice(pos+30,pos+30+fnLen));
      const dataStart=pos+30+fnLen+extraLen;
      if(compMethod===0&&(fn.includes('document.xml')||fn.includes('section'))){
        const raw=new TextDecoder('utf-8',{fatal:false}).decode(bytes.slice(dataStart,dataStart+compSize));
        const matches=raw.match(/<w:t[^>]*>([^<]+)<\/w:t>|<t>([^<]+)<\/t>/g)||[];
        texts.push(...matches.map(m=>m.replace(/<[^>]+>/g,'')));
      }
      pos=dataStart+Math.max(0,compSize);
    }else{pos++;}
  }
  return texts.join(' ');
}

/* ── Drive URL 파싱 ── */
/**
 * Google Drive 공유 링크 → 뷰/다운로드 링크 변환
 * 지원 형식:
 *   https://drive.google.com/file/d/FILE_ID/view?...
 *   https://drive.google.com/open?id=FILE_ID
 *   https://docs.google.com/document/d/FILE_ID/edit
 *   기타 일반 URL (그대로 사용)
 */
function parseDriveUrl(raw){
  if(!raw) return {fileUrl:'', downloadUrl:''};
  let m = raw.match(/\/d\/([a-zA-Z0-9_-]{10,})/);
  if(!m) m = raw.match(/[?&]id=([a-zA-Z0-9_-]{10,})/);
  if(m){
    const id = m[1];
    return {
      fileUrl:     `https://drive.google.com/file/d/${id}/view`,
      downloadUrl: `https://drive.google.com/uc?export=download&id=${id}`
    };
  }
  return { fileUrl: raw, downloadUrl: raw };
}

/* ── 모달 ── */
function openModal(html){
  document.getElementById('modalBody').innerHTML=html;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('show');
}
document.getElementById('modalOverlay').addEventListener('click',e=>{
  if(e.target.id==='modalOverlay')closeModal();
});

init();
</script>
</body>
