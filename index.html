<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학교업무별 프로세스</title>
<style>
:root{--ink:#1f2430; --paper:#f7f5f0; --seal:#a8333f; --line:#d8d2c4;}
body{margin:0; font-family:sans-serif; background:var(--paper); color:var(--ink);}
.app{display:grid; grid-template-columns: 260px 1fr; min-height:100vh;}
aside{background:#efebe2; padding:20px;}
main{padding:40px;}
.cat-item{padding:12px; cursor:pointer; border-radius:8px; border:1px solid transparent;}
.cat-item.active{background:white; border:1px solid var(--line);}
.task-item{display:flex; align-items:center; background:white; padding:15px; border-radius:8px; margin-bottom:10px; border:1px solid var(--line);}
button{padding:10px 20px; border-radius:8px; border:none; cursor:pointer; background:var(--seal); color:white;}
textarea{width:100%; padding:10px; border:1px solid var(--line); border-radius:8px; margin-bottom:10px;}
@media(max-width:760px){.app{grid-template-columns:1fr;} aside{display:none;} main{padding:20px;}}
</style>
</head>
<body>
<div class="app">
  <aside id="sidebar"><h3>업무분야</h3><div id="catList"></div><button onclick="addCat()">+ 분야추가</button></aside>
  <main>
    <div id="catContent">
      <h2 id="catTitle">분야를 선택하세요</h2>
      <a id="nbLink" target="_blank" style="display:none;">🤖 NotebookLM ↗</a>
      <div id="stageRail"></div>
      <div style="margin-top:20px;">
        <button onclick="switchView('list')">할일추가</button>
        <button onclick="switchView('monthly')">월별단계</button>
        <button onclick="switchView('memo')">기타메모</button>
      </div>
      <div id="taskList"></div>
      <div id="monthlyList" style="display:none;"></div>
      <div id="memoArea" style="display:none;"><textarea id="memoIn"></textarea><button onclick="saveMemo()">저장</button></div>
    </div>
  </main>
</div>
<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxlBq8OQsZhM4m9WIGwEpEkStt7NsE5HtO3lJPUU8Zy3ky-uw6K0XtboEBoE3UJg2o/exec';
let STATE = { cats:[], curCat:null, curStage:null };

async function api(act, p={}) {
  return new Promise(r => {
    window['cb'] = (d) => r(d);
    const s = document.createElement('script');
    s.src = `${API_URL}?action=${act}&payload=${JSON.stringify(p)}&callback=cb`;
    document.head.appendChild(s);
  });
}

async function init() {
  const data = await api('getAll');
  STATE.cats = data.categories;
  data.categories.forEach(c => {
    const d = document.createElement('div'); d.className='cat-item'; d.textContent=c.name;
    d.onclick = () => selectCat(c);
    document.getElementById('catList').appendChild(d);
  });
}

function selectCat(c) {
  STATE.curCat = c;
  document.getElementById('catTitle').textContent = c.name;
  const nb = document.getElementById('nbLink');
  if(c.notebookLink) { nb.style.display='block'; nb.href=c.notebookLink; }
  else nb.style.display='none';
  loadTasks();
}

async function loadTasks() {
  const d = await api('getTasks', {stageId: STATE.curStage});
  document.getElementById('taskList').innerHTML = d.tasks.map(t => `<div class='task-item'>${t.content}</div>`).join('');
}

async function saveMemo() {
  await api('saveMemo', {stageId: STATE.curStage, content: document.getElementById('memoIn').value});
  alert('저장됨');
}

function switchView(v) {
  document.getElementById('taskList').style.display = v=='list' ? 'block' : 'none';
  document.getElementById('monthlyList').style.display = v=='monthly' ? 'block' : 'none';
  document.getElementById('memoArea').style.display = v=='memo' ? 'block' : 'none';
}

function addCat() {
  const name = prompt('분야명');
  if(name) api('addCategory', {name}).then(() => location.reload());
}

init();
</script>
</body>
</html>
