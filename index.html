<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학교업무별 프로세스</title>
<style>
:root{
  --ink:#1f2430;
  --paper:#f7f5f0;
  --paper-deep:#efebe2;
  --line:#d8d2c4;
  --seal:#a8333f;       /* 직인 레드 - 강조용, 아껴서 사용 */
  --seal-soft:#f3e1e1;
  --pine:#3c5a4e;        /* 보조 톤 - 완료/안정 */
  --pine-soft:#e3ebe6;
  --gold:#a3793b;        /* 보조 톤 - 대기/주의 */
  --gold-soft:#f1e7d6;
  --muted:#7c7568;
  --white:#ffffff;
  --radius:10px;
  --shadow:0 1px 2px rgba(31,36,48,0.06), 0 4px 14px rgba(31,36,48,0.05);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:var(--paper);
  color:var(--ink);
  font-size:15px;
  line-height:1.55;
}
.app{
  display:grid;
  grid-template-columns:268px 1fr;
  min-height:100vh;
}
/* ===== 사이드바 ===== */
.sidebar{
  background:var(--paper-deep);
  border-right:1px solid var(--line);
  padding:22px 16px 24px;
  display:flex;
  flex-direction:column;
  gap:18px;
}
.brand{
  display:flex;
  align-items:baseline;
  gap:8px;
  padding:0 6px;
}
.brand .mark{
  width:10px;height:10px;border-radius:2px;background:var(--seal);
  display:inline-block;transform:rotate(45deg);flex-shrink:0;
}
.brand h1{font-size:16px;font-weight:700;margin:0;letter-spacing:-0.2px;}
.brand small{color:var(--muted);font-size:11.5px;cursor:pointer;border-bottom:1px dashed transparent;}
.brand small:hover{color:var(--seal);border-bottom-color:var(--seal);}

.cat-list{display:flex;flex-direction:column;gap:3px;flex:1;overflow-y:auto;}
.cat-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:8px;cursor:pointer;
  color:var(--ink);font-size:14px;font-weight:500;
  transition:background .12s ease;
  border:1px solid transparent;
}
.cat-item:hover{background:rgba(31,36,48,0.04);}
.cat-item.active{
  background:var(--white);
  border-color:var(--line);
  box-shadow:var(--shadow);
}
.cat-dot{width:7px;height:7px;border-radius:50%;background:var(--seal);flex-shrink:0;}
.cat-item .owner{margin-left:auto;font-size:11px;color:var(--muted);font-weight:400;}

.sidebar-foot{display:flex;flex-direction:column;gap:8px;padding-top:10px;border-top:1px solid var(--line);}
.btn-ghost{
  background:transparent;border:1px dashed var(--line);color:var(--muted);
  padding:9px 12px;border-radius:8px;font-size:13px;cursor:pointer;text-align:left;
  width:100%;font-family:inherit;
}
.btn-ghost:hover{border-color:var(--seal);color:var(--seal);}
.whoami{font-size:11px;color:var(--muted);padding:0 6px;}

/* ===== 메인 ===== */
.main{padding:30px 40px 60px;max-width:980px;}
.cat-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:16px;}
.cat-header h2{font-size:24px;margin:0 0 4px;letter-spacing:-0.3px;}
.cat-header p{margin:0;color:var(--muted);font-size:13.5px;}
.cat-actions{display:flex;gap:8px;flex-shrink:0;}
.icon-btn{
  background:var(--white);border:1px solid var(--line);border-radius:8px;
  padding:6px 12px;font-size:12.5px;cursor:pointer;color:var(--ink);font-family:inherit;
}
.icon-btn:hover{border-color:var(--seal);color:var(--seal);}

/* 탭 */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:24px;}
.tab{
  padding:11px 18px;font-size:14px;font-weight:600;color:var(--muted);
  cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;
  user-select:none;
}
.tab:hover{color:var(--ink);}
.tab.active{color:var(--seal);border-bottom-color:var(--seal);}

.panel{display:none;}
.panel.active{display:block;}

/* ===== 단계 타임라인 (단계별할일 탭) ===== */
.stage-rail{display:flex;align-items:center;gap:0;margin-bottom:6px;overflow-x:auto;padding-bottom:4px;}
.stage-pill{
  display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:999px;
  border:1px solid var(--line);background:var(--white);cursor:pointer;white-space:nowrap;
  font-size:13.5px;font-weight:600;color:var(--muted);flex-shrink:0;
}
.stage-pill .num{
  width:20px;height:20px;border-radius:50%;background:var(--paper-deep);color:var(--muted);
  font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700;
}
.stage-pill.active{border-color:var(--seal);color:var(--seal);background:var(--seal-soft);}
.stage-pill.active .num{background:var(--seal);color:#fff;}
.stage-connector{width:18px;height:1px;background:var(--line);flex-shrink:0;}
.stage-manage-row{display:flex;justify-content:flex-end;gap:8px;margin:8px 0 20px;}

.task-toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.btn-primary{
  background:var(--ink);color:#fff;border:none;border-radius:8px;padding:9px 16px;
  font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
}
.btn-primary.seal{background:var(--seal);}
.btn-primary:hover{opacity:0.88;}
.btn-secondary{
  background:var(--white);border:1px solid var(--line);border-radius:8px;padding:9px 16px;
  font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--ink);
}
.btn-secondary:hover{border-color:var(--ink);}

.task-list{display:flex;flex-direction:column;gap:8px;}
.task-item{
  display:flex;align-items:flex-start;gap:12px;background:var(--white);
  border:1px solid var(--line);border-radius:var(--radius);padding:13px 16px;
}
.task-item.done{opacity:0.5;}
.task-check{
  width:19px;height:19px;border-radius:5px;border:1.5px solid var(--line);flex-shrink:0;
  margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.task-check.checked{background:var(--pine);border-color:var(--pine);color:#fff;font-size:12px;}
.task-body{flex:1;min-width:0;}
.task-content{font-size:14.5px;font-weight:500;}
.task-item.done .task-content{text-decoration:line-through;}
.task-meta{font-size:12px;color:var(--muted);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap;}
.task-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:2px 4px;}
.task-del:hover{color:var(--seal);}

.empty-state{
  border:1px dashed var(--line);border-radius:var(--radius);padding:36px 20px;
  text-align:center;color:var(--muted);font-size:13.5px;background:rgba(255,255,255,0.4);
}

/* ===== 법령공문 / 결재예시서식 카드 ===== */
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.doc-card{
  background:var(--white);border:1px solid var(--line);border-radius:var(--radius);
  padding:15px 16px;display:flex;flex-direction:column;gap:8px;
}
.doc-tag{
  align-self:flex-start;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:5px;
  background:var(--gold-soft);color:var(--gold);letter-spacing:0.2px;
}
.doc-tag.form{background:var(--pine-soft);color:var(--pine);}
.doc-title{font-size:14.5px;font-weight:600;}
.doc-sub{font-size:12px;color:var(--muted);}
.doc-foot{display:flex;justify-content:space-between;align-items:center;margin-top:4px;}
.doc-link{font-size:12.5px;color:var(--seal);text-decoration:none;font-weight:600;}
.doc-link:hover{text-decoration:underline;}
.doc-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;}

/* ===== QnA ===== */
.qna-list{display:flex;flex-direction:column;gap:10px;}
.qna-card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:16px;}
.qna-q{display:flex;gap:10px;align-items:flex-start;}
.qna-badge{
  flex-shrink:0;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:5px;
  background:var(--seal-soft);color:var(--seal);margin-top:1px;
}
.qna-badge.done{background:var(--pine-soft);color:var(--pine);}
.qna-qtext{font-weight:600;font-size:14.5px;}
.qna-meta{font-size:11.5px;color:var(--muted);margin-top:3px;}
.qna-answer{margin:10px 0 0 0;padding:12px 14px;background:var(--paper);border-radius:8px;font-size:13.5px;}
.qna-answer .label{font-size:11px;color:var(--pine);font-weight:700;margin-bottom:4px;}
.qna-answer-form{display:flex;gap:8px;margin-top:10px;}
.qna-answer-form input{flex:1;}

input[type=text],input[type=email],textarea,select{
  width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:8px;
  font-size:13.5px;font-family:inherit;background:#fff;color:var(--ink);
}
textarea{resize:vertical;min-height:80px;}
label{font-size:12.5px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px;}
.field{margin-bottom:14px;}

/* ===== 모달 ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(31,36,48,0.45);display:none;
  align-items:center;justify-content:center;z-index:100;padding:20px;
}
.modal-overlay.show{display:flex;}
.modal{
  background:#fff;border-radius:14px;padding:26px 28px;max-width:480px;width:100%;
  max-height:86vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);
}
.modal h3{margin:0 0 4px;font-size:17px;}
.modal .sub{font-size:12.5px;color:var(--muted);margin-bottom:18px;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:6px;}
.hint{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.5;}
.ai-result-list{display:flex;flex-direction:column;gap:6px;margin:12px 0;max-height:280px;overflow-y:auto;}
.ai-result-item{
  display:flex;gap:8px;align-items:flex-start;background:var(--paper);border-radius:8px;padding:9px 11px;font-size:13px;
}
.ai-result-item input[type=checkbox]{margin-top:3px;}
.loading-text{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px;}
.spinner{
  width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--seal);
  border-radius:50%;animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.stage-edit-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--paper);}
.stage-edit-row input{flex:1;}
.stage-edit-row button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;}
.stage-edit-row button:hover{color:var(--seal);}
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;padding:11px 20px;border-radius:8px;font-size:13.5px;
  z-index:200;opacity:0;transition:opacity .25s ease;pointer-events:none;
}
.toast.show{opacity:1;}
.file-drop{
  border:1.5px dashed var(--line);border-radius:8px;padding:14px;text-align:center;
  font-size:12.5px;color:var(--muted);cursor:pointer;background:var(--paper);
}
.file-drop.has-file{border-color:var(--pine);color:var(--pine);background:var(--pine-soft);}

@media (max-width:760px){
  .app{grid-template-columns:1fr;}
  .sidebar{
    flex-direction:row;overflow-x:auto;border-right:none;border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:10;
  }
  .cat-list{flex-direction:row;flex:none;}
  .sidebar-foot{display:none;}
  .main{padding:20px 16px 40px;}
}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <span class="mark"></span>
      <div>
        <h1>학교업무별 프로세스</h1><br>
        <small id="schoolNameLabel" title="클릭하여 학교명 변경">학교명 설정</small>
      </div>
    </div>
    <div class="cat-list" id="catList"></div>
    <div class="sidebar-foot">
      <button class="btn-ghost" id="addCategoryBtn">+ 업무분야 추가</button>
      <div class="whoami" id="whoamiBox">확인 중...</div>
    </div>
  </aside>

  <main class="main">
    <div id="emptyMain" class="empty-state" style="margin-top:60px;">왼쪽에서 업무분야를 선택하세요.</div>

    <div id="catContent" style="display:none;">
      <div class="cat-header">
        <div>
          <h2 id="catTitle">-</h2>
          <p id="catDesc"></p>
        </div>
        <div class="cat-actions">
          <button class="icon-btn" id="editCategoryBtn">분야 수정</button>
          <button class="icon-btn" id="deleteCategoryBtn">분야 삭제</button>
        </div>
      </div>

      <div class="tabs">
        <div class="tab active" data-tab="task">단계별 해야할일</div>
        <div class="tab" data-tab="law">관련법령·공문</div>
        <div class="tab" data-tab="doc">결재예시·서식</div>
        <div class="tab" data-tab="qna">묻고답하기</div>
      </div>

      <!-- 단계별 해야할일 -->
      <div class="panel active" id="panel-task">
        <div class="stage-rail" id="stageRail"></div>
        <div class="stage-manage-row">
          <button class="icon-btn" id="manageStageBtn">단계 추가·삭제·순서변경</button>
        </div>
        <div class="task-toolbar">
          <button class="btn-primary seal" id="addTaskBtn">+ 할일 추가</button>
          <button class="btn-secondary" id="bulkAddBtn">여러 개 한꺼번에 입력</button>
          <button class="btn-secondary" id="aiExtractBtn">📄 소스 문서에서 AI로 추출</button>
        </div>
        <div class="task-list" id="taskList"></div>
      </div>

      <!-- 법령공문 -->
      <div class="panel" id="panel-law">
        <div class="task-toolbar">
          <button class="btn-primary" id="addLawBtn">+ 법령·공문 추가</button>
        </div>
        <div class="doc-grid" id="lawGrid"></div>
      </div>

      <!-- 결재예시/서식 -->
      <div class="panel" id="panel-doc">
        <div class="task-toolbar">
          <button class="btn-primary" id="addDocBtn">+ 결재예시·서식 추가</button>
        </div>
        <div class="doc-grid" id="docGrid"></div>
      </div>

      <!-- QnA -->
      <div class="panel" id="panel-qna">
        <div class="task-toolbar">
          <button class="btn-primary" id="addQuestionBtn">+ 질문하기</button>
        </div>
        <div class="qna-list" id="qnaList"></div>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalBody"></div></div>
<div class="toast" id="toast"></div>

<script>
/* =====================================================================
   설정: Apps Script 배포 후 받은 웹앱 URL을 여기에 붙여넣으세요.
   ===================================================================== */
const API_URL = 'https://script.google.com/macros/s/AKfycbzBmmt1nja3190xeudzdz8y6NrPz-FlY870dultfTz2IDtgFqEV_msBHmNLp-L5SGan/exec';

let STATE = {
  categories: [],
  stagesByCategory: {},
  currentCategoryId: null,
  currentStageId: null,
  currentTab: 'task',
  isAdmin: false,
  userEmail: '',
  schoolName: '학교명 설정'
};

// ---------- API 호출 헬퍼 (JSONP 방식 — Apps Script CORS 문제 해결) ----------
/**
 * Apps Script 웹앱은 외부 도메인(GitHub Pages 등)에서 POST 요청을 받으면
 * CORS 헤더를 응답에 붙여주지 못해 브라우저가 차단합니다.
 * GET + JSONP 방식은 <script> 태그로 요청하므로 CORS 제약을 받지 않습니다.
 */
let _jsonpSeq = 0;

function api(action, payload = {}) {
  return new Promise((resolve, reject) => {
    const cbName = '_gs_cb_' + (++_jsonpSeq) + '_' + Date.now();
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('요청 시간이 초과되었습니다. 네트워크 상태 또는 API URL을 확인해주세요.'));
    }, 20000);

    function cleanup() {
      clearTimeout(timeout);
      delete window[cbName];
      const el = document.getElementById(cbName);
      if (el) el.parentNode.removeChild(el);
    }

    window[cbName] = function(data) {
      cleanup();
      if (!data.ok) {
        reject(new Error(data.error || '알 수 없는 오류'));
      } else {
        resolve(data);
      }
    };

    const params = new URLSearchParams({
      action,
      payload: JSON.stringify(payload),
      callback: cbName
    });

    const script = document.createElement('script');
    script.id = cbName;
    script.src = API_URL + '?' + params.toString();
    script.onerror = () => {
      cleanup();
      reject(new Error('API 스크립트 로드 실패. API URL이 올바른지 확인해주세요.'));
    };
    document.head.appendChild(script);
  });
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---------- 초기 로딩 ----------
async function init() {
  try {
    const who = await api('whoAmI');
    STATE.isAdmin = who.isAdmin;
    STATE.userEmail = who.email;
    document.getElementById('whoamiBox').textContent = who.email ? who.email + (who.isAdmin ? ' · 관리자' : '') : '게스트';
  } catch (e) {
    document.getElementById('whoamiBox').textContent = '로그인 정보를 불러올 수 없습니다.';
  }

  try {
    const data = await api('getAll');
    STATE.categories = data.categories;
    STATE.stagesByCategory = data.stagesByCategory;
    STATE.schoolName = (data.settings && data.settings.schoolName) || '학교명 설정';
    document.getElementById('schoolNameLabel').textContent = STATE.schoolName;
    renderCategoryList();
    if (STATE.categories.length > 0) {
      selectCategory(STATE.categories[0].id);
    }
  } catch (e) {
    toast('초기 로딩 실패: ' + e.message);
  }
}

// ---------- 사이드바 ----------
function renderCategoryList() {
  const el = document.getElementById('catList');
  el.innerHTML = STATE.categories.map(c => `
    <div class="cat-item ${c.id === STATE.currentCategoryId ? 'active' : ''}" data-id="${c.id}">
      <span class="cat-dot"></span>${escapeHtml(c.name)}
      <span class="owner">${escapeHtml(c.owner || '')}</span>
    </div>
  `).join('');
  el.querySelectorAll('.cat-item').forEach(item => {
    item.addEventListener('click', () => selectCategory(item.dataset.id));
  });
}

function selectCategory(id) {
  STATE.currentCategoryId = id;
  STATE.currentStageId = null;
  renderCategoryList();

  const cat = STATE.categories.find(c => c.id === id);
  if (!cat) return;

  document.getElementById('emptyMain').style.display = 'none';
  document.getElementById('catContent').style.display = 'block';
  document.getElementById('catTitle').textContent = cat.name;
  document.getElementById('catDesc').textContent = cat.desc || '';

  switchTab('task');
  renderStageRail();
}

// ---------- 탭 ----------
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(tab.dataset.tab));
});

function switchTab(tabName) {
  STATE.currentTab = tabName;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tabName));

  if (tabName === 'task') renderStageRail();
  if (tabName === 'law') loadLaws();
  if (tabName === 'doc') loadDocs();
  if (tabName === 'qna') loadQna();
}

// ---------- 단계 타임라인 ----------
function renderStageRail() {
  const stages = STATE.stagesByCategory[STATE.currentCategoryId] || [];
  const rail = document.getElementById('stageRail');

  if (stages.length === 0) {
    rail.innerHTML = '<span style="font-size:13px;color:var(--muted);">등록된 단계가 없습니다. "단계 추가·삭제·순서변경"을 눌러 단계를 만들어 보세요.</span>';
    document.getElementById('taskList').innerHTML = '';
    return;
  }

  if (!STATE.currentStageId || !stages.find(s => s.id === STATE.currentStageId)) {
    STATE.currentStageId = stages[0].id;
  }

  rail.innerHTML = stages.map((s, i) => `
    ${i > 0 ? '<span class="stage-connector"></span>' : ''}

async function loadTasks() {
  if (!STATE.currentStageId) return;
  const listEl = document.getElementById('taskList');
  listEl.innerHTML = '<div class="loading-text"><span class="spinner"></span>불러오는 중...</div>';
  try {
    const data = await api('getTasks', { stageId: STATE.currentStageId });
    if (data.tasks.length === 0) {
      listEl.innerHTML = '<div class="empty-state">이 단계에 등록된 할일이 없습니다. 위에서 할일을 추가해보세요.</div>';
      return;
    }
    listEl.innerHTML = data.tasks.map(t => `
      <div class="task-item ${t.done ? 'done' : ''}" data-id="${t.id}">
        <div class="task-check ${t.done ? 'checked' : ''}" data-action="toggle">${t.done ? '✓' : ''}</div>
        <div class="task-body">
          <div class="task-content">${escapeHtml(t.content)}</div>
          <div class="task-meta">
            ${t.note ? `<span>📌 ${escapeHtml(t.note)}</span>` : ''}
            ${t.owner ? `<span>담당: ${escapeHtml(t.owner)}</span>` : ''}
          </div>
        </div>
        <button class="task-del" data-action="delete">✕</button>
      </div>
    `).join('');

    listEl.querySelectorAll('.task-check').forEach(el => {
      el.addEventListener('click', async () => {
        const id = el.closest('.task-item').dataset.id;
        await api('toggleTaskDone', { id });
        loadTasks();
      });
    });
    listEl.querySelectorAll('.task-del').forEach(el => {
      el.addEventListener('click', async () => {
        if (!confirm('이 할일을 삭제할까요?')) return;
        const id = el.closest('.task-item').dataset.id;
        await api('deleteTask', { id });
        loadTasks();
      });
    });
  } catch (e) {
    listEl.innerHTML = `<div class="empty-state">불러오기 실패: ${escapeHtml(e.message)}</div>`;
  }
}

  });

  document.getElementById('stage-edit-list').querySelectorAll('.stage-edit-row').forEach(row => {

    });

  document.getElementById('m-save-stages').addEventListener('click', async () => {

    await refreshStages();
  });
});

async function moveStage(id, dir) {
  const stages = [...(STATE.stagesByCategory[STATE.currentCategoryId] || [])];
  const idx = stages.findIndex(s => s.id === id);
  const swapIdx = idx + dir;
  if (swapIdx < 0 || swapIdx >= stages.length) return;
  [stages[idx], stages[swapIdx]] = [stages[swapIdx], stages[idx]];
  await api('reorderStages', { orderedIds: stages.map(s => s.id) });
  await refreshStages();
  document.getElementById('manageStageBtn').click();
}

async function refreshStages() {
  const data = await api('getStages', { categoryId: STATE.currentCategoryId });
  STATE.stagesByCategory[STATE.currentCategoryId] = data.stages;
  renderStageRail();
}

    <div class="field"><label>설명 (선택)</label><textarea id="m-desc" style="min-height:60px;"></textarea></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn-primary seal" id="m-submit">추가</button>
    </div>
  `);
  document.getElementById('m-submit').addEventListener('click', async () => {
    const name = document.getElementById('m-name').value.trim();
    if (!name) return toast('업무분야명을 입력해주세요.');
    try {
      const res = await api('addCategory', {
        name,
        owner: document.getElementById('m-owner').value.trim(),
        desc: document.getElementById('m-desc').value.trim()
      });
      closeModal();
      toast('업무분야가 추가되었습니다.');
      const data = await api('getAll');
      STATE.categories = data.categories;
      STATE.stagesByCategory = data.stagesByCategory;
      renderCategoryList();
      selectCategory(res.id);
    } catch (e) {
      toast('추가 실패: ' + e.message);
    }
  });
});

document.getElementById('deleteCategoryBtn').addEventListener('click', async () => {
  const cat = STATE.categories.find(c => c.id === STATE.currentCategoryId);
  if (!confirm(`"${cat.name}" 업무분야를 삭제할까요? (데이터는 보존되며 메뉴에서만 숨겨집니다)`)) return;
  try {
    await api('deleteCategory', { id: cat.id });
    toast('삭제되었습니다.');
    const data = await api('getAll');
    STATE.categories = data.categories;
    STATE.stagesByCategory = data.stagesByCategory;
    renderCategoryList();
    if (STATE.categories.length > 0) {
      selectCategory(STATE.categories[0].id);
    } else {
      document.getElementById('catContent').style.display = 'none';
      document.getElementById('emptyMain').style.display = 'block';
    }
  } catch (e) {
    toast('삭제 실패: ' + e.message);
  }
});

// ---------- 파일 업로드 공용 ----------
let selectedFile = null;

function setupFileDrop() {
  selectedFile = null;
  const drop = document.getElementById('m-filedrop');
  const input = document.getElementById('m-fileinput');
  drop.addEventListener('click', () => input.click());
  input.addEventListener('change', () => {
    if (input.files.length > 0) {
      selectedFile = input.files[0];
      drop.textContent = '✓ ' + selectedFile.name;
      drop.classList.add('has-file');
    }
  });
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadIfFileSelected() {
  if (!selectedFile) return null;
  const base64Data = await fileToBase64(selectedFile);
  const cat = STATE.categories.find(c => c.id === STATE.currentCategoryId);

  // 파일 업로드는 데이터가 커서 JSONP URL 길이 제한 초과 → POST fetch 사용
  // Apps Script 배포가 "모든 사용자" 접근이면 응답 자체는 도착하지만
  // CORS 헤더 부재로 브라우저가 응답을 막을 수 있음.
  // 이를 해결하기 위해 응답을 text로 받아 직접 파싱합니다.
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: 'uploadFile',
        payload: {
          fileName: selectedFile.name,
          mimeType: selectedFile.type || 'application/octet-stream',
          base64Data,
          categoryName: cat ? cat.name : ''
        }
      })
    });
    const text = await res.text();
    const data = JSON.parse(text);
    if (!data.ok) throw new Error(data.error || '파일 업로드 실패');
    return data;
  } catch (e) {
    // fetch가 완전히 막힌 경우, 파일 없이 텍스트만 저장하고 사용자에게 안내
    toast('파일 업로드 실패: ' + e.message + ' (파일 없이 텍스트만 저장합니다)');
    return null;
  }
}

// ---------- 모달 공용 ----------
function openModal(html) {
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  selectedFile = null;
}
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target.id === 'modalOverlay') closeModal();
});
