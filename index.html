<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>학교업무별 프로세스</title>
<style>
  :root{
    --bg:#f6f7fb; --panel:#ffffff; --border:#e4e7ee; --border-strong:#cdd2db;
    --text:#1f2330; --muted:#6b7280; --primary:#2563eb; --primary-dark:#1d4ed8;
    --danger:#dc2626; --success:#16a34a; --warning:#d97706;
    --radius:8px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:var(--bg);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  a{color:var(--primary);text-decoration:none}
  a:hover{text-decoration:underline}

  .app{display:flex;height:100vh;overflow:hidden}

  /* ===== 사이드바 ===== */
  .sidebar{width:260px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column}
  .brand{padding:16px;border-bottom:1px solid var(--border)}
  .brand h1{margin:0;font-size:15px;font-weight:700}
  .brand small{display:block;color:var(--muted);font-size:12px;margin-top:4px;cursor:pointer}
  .brand small:hover{color:var(--primary)}
  .cat-list{flex:1;overflow-y:auto;padding:8px}
  .cat-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:var(--radius);cursor:pointer;margin-bottom:2px;border:1px solid transparent}
  .cat-item:hover{background:#f0f3f9}
  .cat-item.active{background:#e0ecff;border-color:#bfdbfe;color:var(--primary-dark);font-weight:600}
  .cat-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sidebar-foot{padding:12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
  .whoami{font-size:11px;color:var(--muted);text-align:center;line-height:1.5}
  .whoami b{color:var(--success)}

  /* ===== 메인 ===== */
  .main{flex:1;overflow-y:auto;padding:20px 28px}
  .empty-state{text-align:center;color:var(--muted);padding:60px 0}
  .cat-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
  .cat-header h2{margin:0 0 4px 0;font-size:20px}
  .cat-header p{margin:0;color:var(--muted);font-size:13px}
  .cat-actions{display:flex;gap:6px}

  /* ===== 탭 ===== */
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px}
  .tab{padding:9px 16px;border:none;background:transparent;font-size:14px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
  .tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
  .tab-panel{display:none}
  .tab-panel.active{display:block}

  /* ===== 단계 카드 (세로) ===== */
  .stage-toolbar{display:flex;justify-content:flex-end;margin-bottom:12px}
  .stage-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
  .stage-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fafbfc;border-bottom:1px solid var(--border)}
  .stage-title{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px}
  .stage-no{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;font-size:12px;font-weight:700}
  .stage-actions{display:flex;gap:4px}

  /* 단계 내부: 가로 4열 */
  .stage-body{display:grid;grid-template-columns:repeat(4,1fr);gap:0}
  .col{padding:12px 14px;border-right:1px solid var(--border)}
  .col:last-child{border-right:none}
  .col-head{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
  .col-head .add-mini{font-size:11px;padding:3px 8px;border:1px solid var(--border-strong);background:#fff;border-radius:4px;color:var(--text)}
  .col-head .add-mini:hover{background:var(--primary);color:#fff;border-color:var(--primary)}

  /* 할일 */
  .task-list{display:flex;flex-direction:column;gap:6px}
  .task-item{display:flex;gap:8px;padding:8px;border:1px solid var(--border);border-radius:6px;background:#fff}
  .task-item.done .task-text{text-decoration:line-through;color:var(--muted)}
  .task-item input[type="checkbox"]{margin-top:2px;cursor:pointer}
  .task-body{flex:1;min-width:0}
  .task-text{font-size:13px;line-height:1.45;word-break:break-word}
  .task-meta{font-size:11px;color:var(--muted);margin-top:3px}
  .task-del{background:none;border:none;color:var(--danger);font-size:14px;padding:0 4px}

  /* 자료 카드 (결재예시/법령/기타) */
  .doc-list{display:flex;flex-direction:column;gap:8px}
  .doc-item{padding:10px;border:1px solid var(--border);border-radius:6px;background:#fff}
  .doc-title{font-weight:600;font-size:13px;line-height:1.35;margin-bottom:4px;word-break:break-word}
  .doc-sub{font-size:11px;color:var(--muted);margin-bottom:6px;line-height:1.4}
  .doc-actions{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
  .doc-actions a, .doc-actions button{font-size:11px;padding:3px 8px;border:1px solid var(--border-strong);background:#fff;border-radius:4px;color:var(--text);text-decoration:none;display:inline-block}
  .doc-actions a:hover{background:var(--primary);color:#fff;border-color:var(--primary);text-decoration:none}
  .doc-actions .del{color:var(--danger)}
  .doc-actions .del:hover{background:var(--danger);color:#fff;border-color:var(--danger)}

  .empty-mini{font-size:12px;color:var(--muted);padding:8px;text-align:center}

  /* ===== 묻고답하기 ===== */
  .qna-form{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:16px}
  .qna-form textarea{width:100%;min-height:70px;padding:9px;border:1px solid var(--border-strong);border-radius:6px;font-family:inherit;font-size:13px;resize:vertical}
  .qna-list{display:flex;flex-direction:column;gap:10px}
  .qna-item{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:14px}
  .qna-q{font-weight:600;margin-bottom:6px;line-height:1.45}
  .qna-meta{font-size:11px;color:var(--muted);margin-bottom:8px}
  .qna-a{background:#f6f8fc;border-left:3px solid var(--primary);padding:9px 11px;margin-top:8px;border-radius:0 6px 6px 0;font-size:13px;line-height:1.5}
  .qna-a.empty{color:var(--muted);font-style:italic}
  .qna-status{display:inline-block;font-size:11px;padding:1px 7px;border-radius:3px;font-weight:600;margin-left:6px}
  .qna-status.done{background:#dcfce7;color:#166534}
  .qna-status.wait{background:#fef3c7;color:#92400e}

  /* ===== 버튼 ===== */
  .btn{padding:7px 14px;border-radius:6px;border:1px solid var(--border-strong);background:#fff;color:var(--text);font-size:13px}
  .btn:hover{background:#f0f3f9}
  .btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
  .btn-primary:hover{background:var(--primary-dark)}
  .btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
  .btn-danger:hover{background:#b91c1c}
  .btn-ghost{background:transparent;border:1px dashed var(--border-strong);color:var(--muted);padding:8px}
  .btn-ghost:hover{background:#f0f3f9;color:var(--text)}
  .icon-btn{padding:5px 10px;border-radius:5px;border:1px solid var(--border);background:#fff;color:var(--text);font-size:12px}
  .icon-btn:hover{background:#f0f3f9}
  .icon-btn.danger{color:var(--danger);border-color:#fecaca}
  .icon-btn.danger:hover{background:#fee2e2}

  /* ===== 모달 ===== */
  .modal-bg{position:fixed;inset:0;background:rgba(15,18,28,.45);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:10px;max-width:520px;width:100%;max-height:88vh;overflow-y:auto;padding:22px}
  .modal h3{margin:0 0 14px 0;font-size:17px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;font-weight:600;margin-bottom:5px;color:var(--text)}
  .field input[type="text"],.field input[type="password"],.field input[type="number"],.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--border-strong);border-radius:6px;font-size:13px;font-family:inherit}
  .field textarea{min-height:70px;resize:vertical}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

  /* 드롭존 */
  .file-drop{border:2px dashed var(--border-strong);border-radius:8px;padding:24px;text-align:center;color:var(--muted);background:#fafbfc;cursor:pointer;transition:.15s}
  .file-drop:hover,.file-drop.drag{border-color:var(--primary);background:#eff5ff;color:var(--primary-dark)}
  .file-drop.has-file{border-style:solid;border-color:var(--success);background:#f0fdf4;color:#166534}
  .file-drop small{display:block;margin-top:6px;font-size:11px;opacity:.8}

  /* 진행률 */
  .progress{margin-top:10px;height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden;display:none}
  .progress.show{display:block}
  .progress-bar{height:100%;background:var(--primary);transition:width .2s;width:0%}

  /* 관리자 표시 토글 */
  .admin-only{display:none}
  body.is-admin .admin-only{display:inline-flex}
  body.is-admin .admin-only-block{display:block}

  /* 토스트 */
  .toast{position:fixed;top:18px;right:18px;background:#1f2330;color:#fff;padding:11px 16px;border-radius:6px;font-size:13px;z-index:200;opacity:0;transform:translateY(-8px);transition:.25s;pointer-events:none;max-width:340px}
  .toast.show{opacity:1;transform:translateY(0)}
  .toast.error{background:var(--danger)}
  .toast.success{background:var(--success)}

  @media (max-width: 900px){
    .stage-body{grid-template-columns:1fr;}
    .col{border-right:none;border-bottom:1px solid var(--border)}
    .col:last-child{border-bottom:none}
    .sidebar{width:220px}
    .main{padding:14px}
  }
</style>
</head>
<body>

<div class="app">
  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="brand">
      <h1>학교업무별 프로세스</h1>
      <small id="schoolNameLabel" title="클릭하여 학교명 변경">학교명 설정</small>
    </div>
    <div class="cat-list" id="catList"></div>
    <div class="sidebar-foot">
      <button class="btn-ghost admin-only" id="addCategoryBtn">+ 업무분야 추가</button>
      <button class="icon-btn" id="loginBtn">관리자 로그인</button>
      <div class="whoami" id="whoamiBox">확인 중...</div>
    </div>
  </aside>

  <!-- 메인 -->
  <main class="main">
    <div id="emptyMain" class="empty-state">
      왼쪽에서 업무분야를 선택하세요.<br>
      <small>업무분야가 없으면 관리자로 로그인 후 [+ 업무분야 추가]를 눌러주세요.</small>
    </div>

    <div id="catContent" style="display:none;">
      <div class="cat-header">
        <div>
          <h2 id="catTitle">-</h2>
          <p id="catDesc"></p>
        </div>
        <div class="cat-actions admin-only">
          <button class="icon-btn" id="editCategoryBtn">분야 수정</button>
          <button class="icon-btn danger" id="deleteCategoryBtn">분야 삭제</button>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="process">단계별 진행</button>
        <button class="tab" data-tab="qna">묻고답하기</button>
      </div>

      <!-- 단계별 진행 -->
      <div class="tab-panel active" id="panel-process">
        <div class="stage-toolbar admin-only">
          <button class="btn btn-primary" id="addStageBtn">+ 단계 추가</button>
        </div>
        <div id="stageContainer"></div>
        <div id="stageEmpty" class="empty-state" style="display:none;">
          등록된 단계가 없습니다.<br>
          <small class="admin-only-block" style="display:none;">[+ 단계 추가]로 단계를 만들어주세요.</small>
        </div>
      </div>

      <!-- 묻고답하기 -->
      <div class="tab-panel" id="panel-qna">
        <div class="qna-form">
          <div class="field" style="margin-bottom:8px">
            <label>새 질문 등록</label>
            <textarea id="qna-question" placeholder="궁금한 내용을 입력하세요..."></textarea>
          </div>
          <div style="display:flex;justify-content:flex-end">
            <button class="btn btn-primary" id="submitQuestionBtn">질문 등록</button>
          </div>
        </div>
        <div class="qna-list" id="qnaList"></div>
        <div id="qnaEmpty" class="empty-state" style="display:none;">등록된 질문이 없습니다.</div>
      </div>
    </div>
  </main>
</div>

<!-- 모달 -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modalBox"></div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// 설정 — 본인 Apps Script 배포 URL로 교체
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbzxhmZjvqOsvDxAZDTerNZ7AM46n3pePKM03LgQ10ryywIdDRCXdP6sPOnUKE9AU1dG/exec';

// ============================================================
// 상태
// ============================================================
const State = {
  categories: [], stagesByCategory: {}, settings: {},
  currentCategoryId: null,
  email: '', isAdmin: false,
  adminToken: localStorage.getItem('adminToken') || ''
};

// ============================================================
// API 호출 (JSONP)
// ============================================================
let _jsonpId = 0;
function callApi(action, payload = {}) {
  return new Promise((resolve, reject) => {
    const cbName = '__cb_' + (++_jsonpId) + '_' + Date.now();
    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('서버 응답 시간 초과'));
    }, 60000);
    function cleanup() {
      clearTimeout(timer);
      try { delete window[cbName]; } catch(e){ window[cbName] = undefined; }
      const s = document.getElementById(cbName);
      if (s) s.remove();
    }
    window[cbName] = (data) => { cleanup(); resolve(data); };
    // 토큰 자동 첨부
    if (State.adminToken && !payload.token) payload.token = State.adminToken;
    const url = API_URL
      + '?action=' + encodeURIComponent(action)
      + '&callback=' + cbName
      + '&payload=' + encodeURIComponent(JSON.stringify(payload));
    const script = document.createElement('script');
    script.id = cbName;
    script.src = url;
    script.onerror = () => { cleanup(); reject(new Error('네트워크 오류')); };
    document.body.appendChild(script);
  });
}

// ============================================================
// 유틸
// ============================================================
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg, type='') {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast ' + type, 2600);
}
function openModal(html) {
  $('modalBox').innerHTML = html;
  $('modalBg').classList.add('show');
}
function closeModal() { $('modalBg').classList.remove('show'); }
$('modalBg').addEventListener('click', e => { if (e.target.id === 'modalBg') closeModal(); });

// ============================================================
// 파일 → base64 (헤더 제외)
// ============================================================
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => {
      const dataUrl = r.result;
      const b64 = dataUrl.substring(dataUrl.indexOf(',') + 1);
      resolve(b64);
    };
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

// 청크 업로드: 30KB씩 (URL 한계 안전 마진)
async function uploadFileChunked(file, categoryName, onProgress) {
  if (file.size > 20 * 1024 * 1024) {
    throw new Error('파일이 너무 큽니다 (최대 20MB)');
  }
  const b64 = await fileToBase64(file);
  const CHUNK = 30000; // base64 30KB
  const total = Math.ceil(b64.length / CHUNK);
  const uploadId = 'up_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);

  for (let i = 0; i < total; i++) {
    const part = b64.substring(i * CHUNK, (i + 1) * CHUNK);
    const res = await callApi('uploadChunk', { uploadId, index: i, total, data: part });
    if (!res.ok) throw new Error(res.error || '청크 업로드 실패 #' + i);
    if (onProgress) onProgress((i + 1) / (total + 1));
  }
  const fin = await callApi('finishUpload', {
    uploadId, total,
    fileName: file.name,
    mimeType: file.type || 'application/octet-stream',
    categoryName: categoryName || ''
  });
  if (!fin.ok) throw new Error(fin.error || '파일 저장 실패');
  if (onProgress) onProgress(1);
  return fin;
}

// 드롭존 만들기 (모달 내부에서 사용)
function makeFileDrop(dropId, inputId, progressId) {
  const drop = $(dropId);
  const input = $(inputId);
  let selectedFile = null;

  drop.addEventListener('click', () => input.click());
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
  drop.addEventListener('drop', e => {
    e.preventDefault();
    drop.classList.remove('drag');
    if (e.dataTransfer.files && e.dataTransfer.files[0]) {
      setFile(e.dataTransfer.files[0]);
    }
  });
  input.addEventListener('change', () => {
    if (input.files && input.files[0]) setFile(input.files[0]);
  });
  function setFile(f) {
    selectedFile = f;
    drop.classList.add('has-file');
    drop.innerHTML = '<strong>' + esc(f.name) + '</strong><small>' + (f.size/1024).toFixed(1) + ' KB · 클릭하여 변경</small>';
  }
  return {
    getFile: () => selectedFile,
    setProgress: (ratio) => {
      const p = $(progressId);
      if (!p) return;
      p.classList.add('show');
      p.querySelector('.progress-bar').style.width = (ratio*100).toFixed(0) + '%';
    }
  };
}

// ============================================================
// 부팅
// ============================================================
async function boot() {
  try {
    const who = await callApi('whoAmI', {});
    if (who.ok) {
      State.email = who.email || '';
      State.isAdmin = !!who.isAdmin;
      document.body.classList.toggle('is-admin', State.isAdmin);
      $('whoamiBox').innerHTML = State.isAdmin
        ? '<b>관리자 로그인됨</b><br>' + esc(State.email || '관리자')
        : (State.email ? esc(State.email) + '<br>(일반 사용자)' : '비로그인 사용자');
      $('loginBtn').textContent = State.isAdmin ? '로그아웃' : '관리자 로그인';
    }
    await reloadAll();
  } catch (err) {
    console.error(err);
    toast('연결 실패: ' + err.message, 'error');
  }
}

async function reloadAll() {
  const res = await callApi('getAll', {});
  if (!res.ok) { toast(res.error || '데이터 로드 실패', 'error'); return; }
  State.categories = res.categories || [];
  State.stagesByCategory = res.stagesByCategory || {};
  State.settings = res.settings || {};
  $('schoolNameLabel').textContent = State.settings.schoolName || '학교명 설정';
  renderCategories();
  if (State.currentCategoryId) selectCategory(State.currentCategoryId, true);
}

// ============================================================
// 사이드바 렌더
// ============================================================
function renderCategories() {
  const list = $('catList');
  list.innerHTML = '';
  if (State.categories.length === 0) {
    list.innerHTML = '<div class="empty-mini">업무분야가 없습니다.</div>';
    return;
  }
  State.categories.forEach(c => {
    const div = document.createElement('div');
    div.className = 'cat-item' + (c.id === State.currentCategoryId ? ' active' : '');
    div.innerHTML = '<span class="name">' + esc(c.name) + '</span>';
    div.onclick = () => selectCategory(c.id);
    list.appendChild(div);
  });
}

// ============================================================
// 카테고리 선택
// ============================================================
async function selectCategory(catId, keepTab) {
  State.currentCategoryId = catId;
  renderCategories();
  const cat = State.categories.find(c => c.id === catId);
  if (!cat) {
    $('emptyMain').style.display = 'block';
    $('catContent').style.display = 'none';
    return;
  }
  $('emptyMain').style.display = 'none';
  $('catContent').style.display = 'block';
  $('catTitle').textContent = cat.name;
  $('catDesc').textContent = (cat.desc || '') + (cat.owner ? ' · 담당: ' + cat.owner : '');

  if (!keepTab) switchTab('process');
  await renderStages(catId);
  await renderQna(catId);
}

// ============================================================
// 탭 전환
// ============================================================
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
}
document.querySelectorAll('.tab').forEach(t => t.onclick = () => switchTab(t.dataset.tab));

async function renderStages(catId) {
  const container = $('stageContainer');
  const empty = $('stageEmpty');
  const stages = State.stagesByCategory[catId] || [];
  container.innerHTML = '';
  if (stages.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  // 모든 단계의 자료 한 번에 가져오기
  for (let i = 0; i < stages.length; i++) {
    const stage = stages[i];
    const card = document.createElement('div');
    card.className = 'stage-card';
    card.innerHTML = `
      <div class="stage-head">
        <div class="stage-title">
          <span class="stage-no">${i+1}</span>
          <span>${esc(stage.name)}</span>
        </div>
        <div class="stage-actions admin-only">
          <button class="icon-btn" data-edit-stage="${stage.id}">단계명 수정</button>
          <button class="icon-btn danger" data-del-stage="${stage.id}">삭제</button>
        </div>
      </div>
      <div class="stage-body">
        <div class="col">
          <div class="col-head">해야할일
            <button class="add-mini" data-add-task="${stage.id}">+ 추가</button>
          </div>
          <div class="task-list" data-tasks="${stage.id}"><div class="empty-mini">불러오는 중...</div></div>
        </div>
        <div class="col">
          <div class="col-head">결재예시·서식
            <button class="add-mini admin-only" data-add-doc="${stage.id}">+ 추가</button>
          </div>
          <div class="doc-list" data-docs="${stage.id}"><div class="empty-mini">불러오는 중...</div></div>
        </div>
        <div class="col">
          <div class="col-head">관련법령·공문
            <button class="add-mini admin-only" data-add-law="${stage.id}">+ 추가</button>
          </div>
          <div class="doc-list" data-laws="${stage.id}"><div class="empty-mini">불러오는 중...</div></div>
        </div>
        <div class="col">
          <div class="col-head">기타
            <button class="add-mini admin-only" data-add-etc="${stage.id}">+ 추가</button>
          </div>
          <div class="doc-list" data-etcs="${stage.id}"><div class="empty-mini">불러오는 중...</div></div>
        </div>
      </div>
    `;
    container.appendChild(card);

    // 비동기 로드
    loadStageBundle(stage.id, catId);
  }

  // 이벤트 위임
  container.onclick = (e) => {
    const t = e.target;
    if (t.dataset.editStage) { onEditStage(t.dataset.editStage); }
    else if (t.dataset.delStage)  { onDeleteStage(t.dataset.delStage); }
    else if (t.dataset.addTask)   { onAddTask(t.dataset.addTask); }
    else if (t.dataset.addDoc)    { onAddDoc(t.dataset.addDoc, catId); }
    else if (t.dataset.addLaw)    { onAddLaw(t.dataset.addLaw, catId); }
    else if (t.dataset.addEtc)    { onAddEtc(t.dataset.addEtc, catId); }
  };
}

async function loadStageBundle(stageId, catId) {
  try {
    const res = await callApi('getStageBundle', { stageId });
    if (!res.ok) return;
    renderTaskList(stageId, res.tasks || []);
    renderDocList(stageId, 'docs', res.docs || []);
    renderDocList(stageId, 'laws', res.laws || []);
    renderDocList(stageId, 'etcs', res.etcs || []);
  } catch(err) { console.error(err); }
}

function renderTaskList(stageId, tasks) {
  const wrap = document.querySelector(`[data-tasks="${stageId}"]`);
  if (!wrap) return;
  if (tasks.length === 0) {
    wrap.innerHTML = '<div class="empty-mini">할일 없음</div>';
    return;
  }
  wrap.innerHTML = '';
  tasks.forEach(t => {
    const div = document.createElement('div');
    div.className = 'task-item' + (t.done ? ' done' : '');
    div.innerHTML = `
      <input type="checkbox" ${t.done ? 'checked' : ''} data-toggle-task="${t.id}">
      <div class="task-body">
        <div class="task-text">${esc(t.content)}</div>
        ${t.note ? `<div class="task-meta">비고: ${esc(t.note)}</div>` : ''}
        ${t.owner ? `<div class="task-meta">담당: ${esc(t.owner)}</div>` : ''}
        ${t.registrant ? `<div class="task-meta">등록: ${esc(t.registrant)}</div>` : ''}
      </div>
      ${State.isAdmin ? `<button class="task-del" data-del-task="${t.id}" title="삭제">×</button>` : ''}
    `;
    wrap.appendChild(div);
  });
  wrap.onclick = (e) => {
    if (e.target.dataset.toggleTask) onToggleTask(e.target.dataset.toggleTask);
    else if (e.target.dataset.delTask) onDeleteTask(e.target.dataset.delTask);
  };
}

function renderDocList(stageId, kind, items) {
  const wrap = document.querySelector(`[data-${kind}="${stageId}"]`);
  if (!wrap) return;
  if (items.length === 0) {
    wrap.innerHTML = '<div class="empty-mini">등록된 항목 없음</div>';
    return;
  }
  wrap.innerHTML = '';
  items.forEach(it => {
    const div = document.createElement('div');
    div.className = 'doc-item';
    const sub = [];
    if (it.lawName) sub.push(esc(it.lawName));
    if (it.type)    sub.push(esc(it.type));
    if (it.memo)    sub.push(esc(it.memo));
    if (it.desc)    sub.push(esc(it.desc));
    const meta = [];
    if (it.owner)     meta.push('등록: ' + esc(it.owner));
    if (it.createdAt) meta.push(esc(it.createdAt));

    div.innerHTML = `
      <div class="doc-title">${esc(it.title || '(제목 없음)')}</div>
      ${sub.length ? `<div class="doc-sub">${sub.join(' · ')}</div>` : ''}
      ${it.fileName ? `<div class="doc-sub">📎 ${esc(it.fileName)}</div>` : ''}
      ${meta.length ? `<div class="doc-sub">${meta.join(' · ')}</div>` : ''}
      <div class="doc-actions">
        ${it.fileUrl     ? `<a href="${esc(it.fileUrl)}" target="_blank">미리보기</a>` : ''}
        ${it.downloadUrl ? `<a href="${esc(it.downloadUrl)}" target="_blank">다운로드</a>` : ''}
        ${State.isAdmin  ? `<button class="del" data-del-${kind}="${it.id}">삭제</button>` : ''}
      </div>
    `;
    wrap.appendChild(div);
  });
  wrap.onclick = (e) => {
    const id = e.target.dataset['del' + kind.charAt(0).toUpperCase() + kind.slice(1)];
    if (id) onDeleteItem(kind, id);
  };
}

async function renderQna(catId) {
  const res = await callApi('getQna', { categoryId: catId });
  const wrap = $('qnaList');
  const empty = $('qnaEmpty');
  if (!res.ok) { wrap.innerHTML = ''; return; }
  const list = res.qna || [];
  if (list.length === 0) {
    wrap.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  wrap.innerHTML = '';
  list.forEach(q => {
    const div = document.createElement('div');
    div.className = 'qna-item';
    const statusBadge = q.status === '답변완료'
      ? '<span class="qna-status done">답변완료</span>'
      : '<span class="qna-status wait">대기</span>';
    div.innerHTML = `
      <div class="qna-q">Q. ${esc(q.question)}${statusBadge}</div>
      <div class="qna-meta">질문자: ${esc(q.asker || '익명')} · ${esc(q.askedAt || '')}</div>
      ${q.answer
        ? `<div class="qna-a">A. ${esc(q.answer)}<div class="qna-meta" style="margin-top:6px">답변자: ${esc(q.answerer || '')} · ${esc(q.answeredAt || '')}</div></div>`
        : `<div class="qna-a empty">아직 답변이 없습니다.</div>`
      }
      <div class="doc-actions" style="margin-top:8px">
        ${!q.answer ? `<button class="icon-btn" data-answer="${q.id}">답변 등록</button>` : ''}
        ${State.isAdmin ? `<button class="icon-btn danger" data-del-qna="${q.id}">삭제</button>` : ''}
      </div>
    `;
    wrap.appendChild(div);
  });
  wrap.onclick = (e) => {
    if (e.target.dataset.answer) onAnswerQna(e.target.dataset.answer);
    else if (e.target.dataset.delQna) onDeleteQna(e.target.dataset.delQna);
  };
}

// --- 관리자 로그인/로그아웃
$('loginBtn').addEventListener('click', () => {
  if (State.isAdmin) {
    State.adminToken = '';
    localStorage.removeItem('adminToken');
    State.isAdmin = false;
    document.body.classList.remove('is-admin');
    $('loginBtn').textContent = '관리자 로그인';
    $('whoamiBox').textContent = '비로그인 사용자';
    toast('로그아웃 되었습니다.', 'success');
    return;
  }
  openModal(`
    <h3>관리자 로그인</h3>
    <p style="color:var(--muted);font-size:13px;margin:0 0 14px 0">PIN을 입력해주세요. (기본값: 1234)</p>
    <div class="field">
      <label>관리자 PIN</label>
      <input type="password" id="m-pin" autofocus placeholder="****">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" id="m-loginBtn">로그인</button>
    </div>
  `);
  $('m-pin').addEventListener('keydown', e => { if (e.key === 'Enter') $('m-loginBtn').click(); });
  $('m-loginBtn').onclick = async () => {
    const pin = $('m-pin').value;
    if (!pin) return;
    const res = await callApi('loginAdmin', { pin });
    if (res.ok) {
      State.adminToken = res.token;
      localStorage.setItem('adminToken', res.token);
      State.isAdmin = true;
      document.body.classList.add('is-admin');
      $('loginBtn').textContent = '로그아웃';
      $('whoamiBox').innerHTML = '<b>관리자 로그인됨</b>';
      closeModal();
      toast('관리자 로그인 성공', 'success');
      reloadAll();
    } else {
      toast(res.error || 'PIN이 일치하지 않습니다.', 'error');

// --- 할일 추가/체크/삭제 (누구나 추가, 관리자만 삭제)
function onAddTask(stageId) {
  openModal(`
    <h3>할일 추가</h3>
    <div class="field"><label>할일 내용 *</label><textarea id="m-content" placeholder="예: 신고 접수 즉시 사안 개요 기록"></textarea></div>
    <div class="field"><label>비고 (선택)</label><input type="text" id="m-note" placeholder="예: 48시간 이내 보호자 통보"></div>
    <div class="field"><label>담당자 (선택)</label><input type="text" id="m-owner" placeholder="예: 담당교사"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" id="m-saveBtn">저장</button>
    </div>
  `);
  $('m-saveBtn').onclick = async () => {
    const content = $('m-content').value.trim();
    if (!content) { toast('내용을 입력해주세요.', 'error'); return; }
    const res = await callApi('addTask', {
      stageId, content,
      note: $('m-note').value, owner: $('m-owner').value,
      user: State.email || ''
    });
    if (res.ok) { closeModal(); toast('등록됨', 'success'); loadStageBundle(stageId); }
    else toast(res.error || '실패', 'error');
  };
}
async function onToggleTask(id) {
  const res = await callApi('toggleTaskDone', { id });
  if (res.ok) {
    // 해당 단계만 새로고침 (어디 단계인지 모르므로 전체 단계 다시)
    const stages = State.stagesByCategory[State.currentCategoryId] || [];
    stages.forEach(s => loadStageBundle(s.id));
  } else toast(res.error || '실패', 'error');
}
async function onDeleteTask(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  const res = await callApi('deleteTask', { id });
  if (res.ok) {
    const stages = State.stagesByCategory[State.currentCategoryId] || [];
    stages.forEach(s => loadStageBundle(s.id));
    toast('삭제됨', 'success');
  } else toast(res.error || '실패', 'error');
}

function onAddDoc(stageId, catId) {
  const catName = (State.categories.find(c => c.id === catId) || {}).name || '';
  openModal(`
    <h3>결재예시·서식 추가</h3>
    <div class="field">
      <label>구분</label>
      <select id="m-type">
        <option value="결재예시">결재예시</option>
        <option value="서식">서식</option>
      </select>
    </div>
    <div class="field"><label>제목 *</label><input type="text" id="m-title" placeholder="예: 사안조사 보고서 양식"></div>
    <div class="field"><label>설명 (선택)</label><textarea id="m-desc"></textarea></div>
    <div class="field">
      <label>첨부파일 (hwp/pdf/docx 등 어떤 형식이든)</label>
      <div class="file-drop" id="m-drop">파일을 드래그하거나 클릭하여 선택<small>최대 20MB</small></div>
      <input type="file" id="m-file" style="display:none">
      <div class="progress" id="m-progress"><div class="progress-bar"></div></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" id="m-saveBtn">저장</button>
    </div>
  `);
  const drop = makeFileDrop('m-drop', 'm-file', 'm-progress');
  $('m-saveBtn').onclick = async () => {
    const title = $('m-title').value.trim();
    if (!title) { toast('제목을 입력해주세요.', 'error'); return; }
    $('m-saveBtn').disabled = true;
    try {
      let fileInfo = {};
      const f = drop.getFile();
      if (f) fileInfo = await uploadFileChunked(f, catName, drop.setProgress);
      const res = await callApi('addDoc', {
        categoryId: catId, stageId,
        title, type: $('m-type').value, desc: $('m-desc').value,
        fileUrl: fileInfo.fileUrl || '', downloadUrl: fileInfo.downloadUrl || '',
        fileName: fileInfo.fileName || '',
        user: State.email || ''
      });
      if (res.ok) { closeModal(); toast('등록됨', 'success'); loadStageBundle(stageId); }
      else toast(res.error || '실패', 'error');
    } catch (err) { toast(err.message, 'error'); }
    finally { $('m-saveBtn').disabled = false; }
  };
}

}

// --- 항목 삭제 공통
async function onDeleteItem(kind, id) {
  const map = { docs: 'deleteDoc', laws: 'deleteLaw', etcs: 'deleteEtc' };
  const action = map[kind];
  if (!action) return;
  if (!confirm('이 항목을 삭제하시겠습니까?\n(첨부 파일은 Drive에 보존됩니다)')) return;
  const res = await callApi(action, { id });
  if (res.ok) {
    const stages = State.stagesByCategory[State.currentCategoryId] || [];
    stages.forEach(s => loadStageBundle(s.id));
    toast('삭제됨', 'success');
  } else toast(res.error || '실패', 'error');
}

// --- 묻고답하기 액션
$('submitQuestionBtn').addEventListener('click', async () => {
  const q = $('qna-question').value.trim();
  if (!q) { toast('질문을 입력해주세요.', 'error'); return; }
  const asker = State.email || prompt('성함(또는 닉네임)을 입력해주세요. (선택)', '') || '익명';
  const res = await callApi('addQuestion', {
    categoryId: State.currentCategoryId, question: q, asker
  });
  if (res.ok) { $('qna-question').value = ''; toast('질문 등록됨', 'success'); renderQna(State.currentCategoryId); }
  else toast(res.error || '실패', 'error');
});

function onAnswerQna(id) {
  openModal(`
    <h3>답변 등록</h3>
    <div class="field"><label>답변 내용 *</label><textarea id="m-answer" style="min-height:120px"></textarea></div>
    <div class="field"><label>답변자 (선택)</label><input type="text" id="m-answerer" placeholder="${esc(State.email || '익명')}"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" id="m-saveBtn">등록</button>
    </div>
  `);
  $('m-saveBtn').onclick = async () => {
    const answer = $('m-answer').value.trim();
    if (!answer) { toast('답변을 입력해주세요.', 'error'); return; }
    const res = await callApi('addAnswer', {
      id, answer,
      answerer: $('m-answerer').value || State.email || '익명'
    });
    if (res.ok) { closeModal(); toast('답변 등록됨', 'success'); renderQna(State.currentCategoryId); }
    else toast(res.error || '실패', 'error');
  };
}

async function onDeleteQna(id) {
  if (!confirm('이 질문을 삭제하시겠습니까?')) return;
  const res = await callApi('deleteQna', { id });
  if (res.ok) { toast('삭제됨', 'success'); renderQna(State.currentCategoryId); }
  else toast(res.error || '실패', 'error');
}
