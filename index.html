<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학교업무별 프로세스</title>
<style>
:root{
  --ink:#1f2430;
  --paper:#f7f5f0;
  --paper-deep:#efebe2;
  --line:#d8d2c4;
  --seal:#a8333f;
  --seal-soft:#f3e1e1;
  --pine:#3c5a4e;
  --pine-soft:#e3ebe6;
  --gold:#a3793b;
  --gold-soft:#f1e7d6;
  --muted:#7c7568;
  --white:#ffffff;
  --radius:10px;
  --shadow:0 1px 2px rgba(31,36,48,0.06), 0 4px 14px rgba(31,36,48,0.05);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:var(--paper);color:var(--ink);font-size:15px;line-height:1.55;
}
.app{display:grid;grid-template-columns:268px 1fr;min-height:100vh;}

/* ===== 사이드바 ===== */
.sidebar{
  background:var(--paper-deep);border-right:1px solid var(--line);
  padding:22px 16px 24px;display:flex;flex-direction:column;gap:18px;
}
.brand{display:flex;align-items:baseline;gap:8px;padding:0 6px;}
.brand .mark{width:10px;height:10px;border-radius:2px;background:var(--seal);display:inline-block;transform:rotate(45deg);flex-shrink:0;}
.brand h1{font-size:16px;font-weight:700;margin:0;letter-spacing:-0.2px;}
.brand small{color:var(--muted);font-size:11.5px;cursor:pointer;border-bottom:1px dashed transparent;}
.brand small:hover{color:var(--seal);border-bottom-color:var(--seal);}

.cat-list{display:flex;flex-direction:column;gap:3px;flex:1;overflow-y:auto;}
.cat-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;
  cursor:pointer;color:var(--ink);font-size:14px;font-weight:500;
  border:1px solid transparent;
}
.cat-item:hover{background:rgba(31,36,48,0.04);}
.cat-item.active{background:var(--white);border-color:var(--line);box-shadow:var(--shadow);}
.cat-dot{width:7px;height:7px;border-radius:50%;background:var(--seal);flex-shrink:0;}
.cat-item .owner{margin-left:auto;font-size:11px;color:var(--muted);font-weight:400;}

.sidebar-foot{display:flex;flex-direction:column;gap:8px;padding-top:10px;border-top:1px solid var(--line);}
.btn-ghost{
  background:transparent;border:1px dashed var(--line);color:var(--muted);
  padding:9px 12px;border-radius:8px;font-size:13px;cursor:pointer;text-align:left;
  width:100%;font-family:inherit;
}
.btn-ghost:hover{border-color:var(--seal);color:var(--seal);}
.btn-ghost[disabled]{opacity:0.4;cursor:not-allowed;}
.whoami{font-size:11px;color:var(--muted);padding:0 6px;}

/* ===== 메인 ===== */
.main{padding:30px 40px 60px;max-width:1400px;}
.cat-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:16px;}
.cat-header h2{font-size:24px;margin:0 0 4px;letter-spacing:-0.3px;}
.cat-header p{margin:0;color:var(--muted);font-size:13.5px;}
.cat-actions{display:flex;gap:8px;flex-shrink:0;}
.icon-btn{
  background:var(--white);border:1px solid var(--line);border-radius:8px;
  padding:6px 12px;font-size:12.5px;cursor:pointer;color:var(--ink);font-family:inherit;
}
.icon-btn:hover{border-color:var(--seal);color:var(--seal);}

/* 탭 */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:22px;}
.tab{
  padding:11px 18px;font-size:14px;font-weight:600;color:var(--muted);
  cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;user-select:none;
}
.tab:hover{color:var(--ink);}
.tab.active{color:var(--seal);border-bottom-color:var(--seal);}
.panel{display:none;}
.panel.active{display:block;}

/* ===== 단계 그리드 (새 레이아웃) ===== */
.stage-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.stage-toolbar h3{margin:0;font-size:15px;color:var(--muted);font-weight:600;}

.stage-block{
  background:var(--white);border:1px solid var(--line);border-radius:var(--radius);
  margin-bottom:16px;overflow:hidden;
}
.stage-block-head{
  display:flex;align-items:center;gap:10px;padding:13px 18px;
  background:var(--paper-deep);border-bottom:1px solid var(--line);
}
.stage-num{
  width:24px;height:24px;border-radius:50%;background:var(--seal);color:#fff;
  font-size:12px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;
}
.stage-name{font-size:15px;font-weight:700;flex:1;}
.stage-block-body{
  display:grid;
  grid-template-columns:repeat(4, minmax(0, 1fr));
  gap:0;
}
.stage-col{
  padding:14px 16px;border-right:1px solid var(--line);min-height:140px;
  display:flex;flex-direction:column;gap:8px;
}
.stage-col:last-child{border-right:none;}
.stage-col-head{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;
}
.stage-col-title{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:0.3px;text-transform:uppercase;}
.stage-col-add{
  background:none;border:1px solid var(--line);border-radius:5px;padding:2px 7px;
  font-size:11px;cursor:pointer;color:var(--muted);font-family:inherit;
}
.stage-col-add:hover{border-color:var(--seal);color:var(--seal);}
.stage-col-add[hidden]{display:none;}

.col-empty{font-size:11.5px;color:var(--muted);padding:6px 0;font-style:italic;}

/* 작은 카드 (단계 안 자료) */
.mini-card{
  background:var(--paper);border:1px solid var(--line);border-radius:6px;
  padding:8px 10px;font-size:12.5px;display:flex;flex-direction:column;gap:3px;
}
.mini-card .title{font-weight:600;color:var(--ink);font-size:12.5px;line-height:1.3;}
.mini-card .sub{font-size:11px;color:var(--muted);}
.mini-card .foot{display:flex;justify-content:space-between;align-items:center;margin-top:2px;}
.mini-card a{font-size:11px;color:var(--seal);text-decoration:none;font-weight:600;}
.mini-card a:hover{text-decoration:underline;}
.mini-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:0;}
.mini-del:hover{color:var(--seal);}
.mini-del[hidden]{display:none;}

/* 작은 할일 (체크박스) */
.mini-task{
  display:flex;gap:7px;align-items:flex-start;background:var(--paper);
  border:1px solid var(--line);border-radius:6px;padding:7px 10px;font-size:12.5px;
}
.mini-task.done{opacity:0.5;}
.mini-task .chk{
  width:15px;height:15px;border-radius:4px;border:1.5px solid var(--line);flex-shrink:0;margin-top:1px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;
}
.mini-task .chk.checked{background:var(--pine);border-color:var(--pine);color:#fff;}
.mini-task .body{flex:1;min-width:0;}
.mini-task.done .body .content{text-decoration:line-through;}
.mini-task .content{font-weight:500;}
.mini-task .note{font-size:10.5px;color:var(--muted);margin-top:2px;}
.mini-task .del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:0;}
.mini-task .del:hover{color:var(--seal);}
.mini-task .del[hidden]{display:none;}

/* ===== QnA 게시판 ===== */
.qna-list{display:flex;flex-direction:column;gap:10px;}
.qna-card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:16px;}
.qna-q{display:flex;gap:10px;align-items:flex-start;}
.qna-badge{
  flex-shrink:0;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:5px;
  background:var(--seal-soft);color:var(--seal);margin-top:1px;
}
.qna-badge.done{background:var(--pine-soft);color:var(--pine);}
.qna-qtext{font-weight:600;font-size:14.5px;}
.qna-meta{font-size:11.5px;color:var(--muted);margin-top:3px;}
.qna-answer{margin:10px 0 0 0;padding:12px 14px;background:var(--paper);border-radius:8px;font-size:13.5px;}
.qna-answer .label{font-size:11px;color:var(--pine);font-weight:700;margin-bottom:4px;}
.qna-answer-form{display:flex;gap:8px;margin-top:10px;}
.qna-answer-form input{flex:1;}

/* ===== 공통 폼 ===== */
input[type=text],input[type=email],textarea,select{
  width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:8px;
  font-size:13.5px;font-family:inherit;background:#fff;color:var(--ink);
}
textarea{resize:vertical;min-height:80px;}
label{font-size:12.5px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px;}
.field{margin-bottom:14px;}

.btn-primary{
  background:var(--ink);color:#fff;border:none;border-radius:8px;padding:9px 16px;
  font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
}
.btn-primary.seal{background:var(--seal);}
.btn-primary:hover{opacity:0.88;}
.btn-secondary{
  background:var(--white);border:1px solid var(--line);border-radius:8px;padding:9px 16px;
  font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--ink);
}
.btn-secondary:hover{border-color:var(--ink);}

/* ===== 모달 ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(31,36,48,0.45);display:none;
  align-items:center;justify-content:center;z-index:100;padding:20px;
}
.modal-overlay.show{display:flex;}
.modal{
  background:#fff;border-radius:14px;padding:26px 28px;max-width:520px;width:100%;
  max-height:86vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);
}
.modal h3{margin:0 0 4px;font-size:17px;}
.modal .sub{font-size:12.5px;color:var(--muted);margin-bottom:18px;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:6px;}
.hint{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.5;}
.ai-result-list{display:flex;flex-direction:column;gap:6px;margin:12px 0;max-height:280px;overflow-y:auto;}
.ai-result-item{display:flex;gap:8px;align-items:flex-start;background:var(--paper);border-radius:8px;padding:9px 11px;font-size:13px;}
.ai-result-item input[type=checkbox]{margin-top:3px;}
.loading-text{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px;}
.spinner{
  width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--seal);
  border-radius:50%;animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.stage-edit-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--paper);}
.stage-edit-row input{flex:1;}
.stage-edit-row button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;}
.stage-edit-row button:hover{color:var(--seal);}
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;padding:11px 20px;border-radius:8px;font-size:13.5px;
  z-index:200;opacity:0;transition:opacity .25s ease;pointer-events:none;
}
.toast.show{opacity:1;}
.file-drop{
  border:1.5px dashed var(--line);border-radius:8px;padding:24px 14px;text-align:center;
  font-size:12.5px;color:var(--muted);cursor:pointer;background:var(--paper);
  transition:all .15s ease;
}
.file-drop.dragover{border-color:var(--seal);background:var(--seal-soft);color:var(--seal);}
.file-drop.has-file{border-color:var(--pine);color:var(--pine);background:var(--pine-soft);}

@media (max-width:900px){
  .stage-block-body{grid-template-columns:1fr;}
  .stage-col{border-right:none;border-bottom:1px solid var(--line);}
  .stage-col:last-child{border-bottom:none;}
}
@media (max-width:760px){
  .app{grid-template-columns:1fr;}
  .sidebar{
    flex-direction:row;overflow-x:auto;border-right:none;border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:10;
  }
  .cat-list{flex-direction:row;flex:none;}
  .sidebar-foot{display:none;}
  .main{padding:20px 16px 40px;}
}
.admin-only[hidden]{display:none !important;}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <span class="mark"></span>
      <div>
        <h1>학교업무별 프로세스</h1><br>
        <small id="schoolNameLabel" title="클릭하여 학교명 변경">학교명 설정</small>
      </div>
    </div>
    <div class="cat-list" id="catList"></div>
    <div class="sidebar-foot">
      <button class="btn-ghost admin-only" id="addCategoryBtn">+ 업무분야 추가</button>
      <div class="whoami" id="whoamiBox">확인 중...</div>
    </div>
  </aside>

  <main class="main">
    <div id="emptyMain" class="empty-state" style="margin-top:60px;color:var(--muted);text-align:center;">왼쪽에서 업무분야를 선택하세요.</div>

    <div id="catContent" style="display:none;">
      <div class="cat-header">
        <div>
          <h2 id="catTitle">-</h2>
          <p id="catDesc"></p>
        </div>
        <div class="cat-actions">
          <button class="icon-btn admin-only" id="editCategoryBtn">분야 수정</button>
          <button class="icon-btn admin-only" id="deleteCategoryBtn">분야 삭제</button>
        </div>
      </div>

      <div class="tabs">
        <div class="tab active" data-tab="stage">단계별 진행</div>
        <div class="tab" data-tab="qna">묻고답하기 게시판</div>
      </div>

      <!-- 단계별 진행 (세로 단계 × 가로 4열) -->
      <div class="panel active" id="panel-stage">
        <div class="stage-toolbar">
          <h3 id="stageCountLabel">단계 0개</h3>
          <div style="display:flex;gap:8px;">
            <button class="icon-btn admin-only" id="aiExtractBtn">파일에서 AI로 할일 추출</button>
            <button class="icon-btn admin-only" id="manageStageBtn">단계 추가·삭제·순서변경</button>
          </div>
        </div>
        <div id="stageContainer"></div>
      </div>

      <!-- QnA 게시판 -->
      <div class="panel" id="panel-qna">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
          <h3 style="margin:0;font-size:15px;color:var(--muted);font-weight:600;">묻고답하기 게시판</h3>
          <button class="btn-primary" id="addQuestionBtn">+ 질문하기</button>
        </div>
        <div class="qna-list" id="qnaList"></div>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalBody"></div></div>
<div class="toast" id="toast"></div>

<script>
/* =====================================================================
   설정: Apps Script 배포 후 받은 웹앱 URL을 여기에 붙여넣으세요.
   ===================================================================== */
const API_URL = 'PUT_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE';

let STATE = {
  categories: [],
  stagesByCategory: {},
  currentCategoryId: null,
  currentTab: 'stage',
  isAdmin: false,
  userEmail: '',
  schoolName: '학교명 설정',
  // 단계별 자료 캐시: { [stageId]: { tasks:[], laws:[], docs:[], etcs:[] } }
  stageData: {}
};

// ---------- JSONP API ----------
let _jsonpSeq = 0;
function api(action, payload = {}) {
  return new Promise((resolve, reject) => {
    const cbName = '_gs_cb_' + (++_jsonpSeq) + '_' + Date.now();
    const timeout = setTimeout(() => { cleanup(); reject(new Error('요청 시간 초과')); }, 30000);
    function cleanup() {
      clearTimeout(timeout);
      delete window[cbName];
      const el = document.getElementById(cbName);
      if (el) el.parentNode.removeChild(el);
    }
    window[cbName] = function(data) {
      cleanup();
      if (!data.ok) reject(new Error(data.error || '알 수 없는 오류'));
      else resolve(data);
    };
    const params = new URLSearchParams({ action, payload: JSON.stringify(payload), callback: cbName });
    const script = document.createElement('script');
    script.id = cbName;
    script.src = API_URL + '?' + params.toString();
    script.onerror = () => { cleanup(); reject(new Error('API 스크립트 로드 실패')); };
    document.head.appendChild(script);
  });
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---------- 초기 로딩 ----------
async function init() {
  try {
    const who = await api('whoAmI');
    STATE.isAdmin = who.isAdmin;
    STATE.userEmail = who.email;
    document.getElementById('whoamiBox').textContent =
      who.email ? who.email + (who.isAdmin ? ' · 관리자' : ' · 일반') : '게스트';
    applyAdminVisibility();
  } catch (e) {
    document.getElementById('whoamiBox').textContent = '로그인 정보 없음';
  }

  try {
    const data = await api('getAll');
    STATE.categories = data.categories;
    STATE.stagesByCategory = data.stagesByCategory;
    STATE.schoolName = (data.settings && data.settings.schoolName) || '학교명 설정';
    document.getElementById('schoolNameLabel').textContent = STATE.schoolName;
    renderCategoryList();
    if (STATE.categories.length > 0) selectCategory(STATE.categories[0].id);
  } catch (e) {
    toast('초기 로딩 실패: ' + e.message);
  }
}

function applyAdminVisibility() {
  document.querySelectorAll('.admin-only').forEach(el => {
    el.hidden = !STATE.isAdmin;
  });
}

// ---------- 사이드바 ----------
function renderCategoryList() {
  const el = document.getElementById('catList');
  el.innerHTML = STATE.categories.map(c => `
    <div class="cat-item ${c.id === STATE.currentCategoryId ? 'active' : ''}" data-id="${c.id}">
      <span class="cat-dot"></span>${escapeHtml(c.name)}
      <span class="owner">${escapeHtml(c.owner || '')}</span>
    </div>
  `).join('');
  el.querySelectorAll('.cat-item').forEach(item => {
    item.addEventListener('click', () => selectCategory(item.dataset.id));
  });
}

function selectCategory(id) {
  STATE.currentCategoryId = id;
  STATE.stageData = {};
  renderCategoryList();
  const cat = STATE.categories.find(c => c.id === id);
  if (!cat) return;
  document.getElementById('emptyMain').style.display = 'none';
  document.getElementById('catContent').style.display = 'block';
  document.getElementById('catTitle').textContent = cat.name;
  document.getElementById('catDesc').textContent = cat.desc || '';
  switchTab('stage');
}

// ---------- 탭 ----------
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(tab.dataset.tab));
});
function switchTab(tabName) {
  STATE.currentTab = tabName;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tabName));
  if (tabName === 'stage') renderStageGrid();
  if (tabName === 'qna') loadQna();
}

// ===================================================================
// 단계별 진행 (세로 단계 × 가로 4열: 해야할일 / 결재예시·서식 / 관련법령 / 기타)
// ===================================================================
async function renderStageGrid() {
  const stages = STATE.stagesByCategory[STATE.currentCategoryId] || [];
  const container = document.getElementById('stageContainer');
  document.getElementById('stageCountLabel').textContent = `단계 ${stages.length}개`;

  if (stages.length === 0) {
    container.innerHTML = `<div style="border:1px dashed var(--line);border-radius:var(--radius);padding:36px 20px;text-align:center;color:var(--muted);">
      등록된 단계가 없습니다. ${STATE.isAdmin ? '"단계 추가·삭제·순서변경"을 눌러 단계를 만들어 보세요.' : '관리자가 단계를 등록하면 표시됩니다.'}
    </div>`;
    return;
  }

  container.innerHTML = stages.map((s, i) => stageBlockSkeleton(s, i)).join('');

  // 각 단계별 자료 비동기 로드
  await Promise.all(stages.map(s => loadStageData(s.id)));
  stages.forEach(s => renderStageBlock(s.id));
  bindStageBlockEvents();
}

function stageBlockSkeleton(stage, idx) {
  const adminAttr = STATE.isAdmin ? '' : 'hidden';
  return `
    <div class="stage-block" data-stage-id="${stage.id}">
      <div class="stage-block-head">
        <div class="stage-num">${idx + 1}</div>
        <div class="stage-name">${escapeHtml(stage.name)}</div>
      </div>
      <div class="stage-block-body">
        <div class="stage-col" data-col="task">
          <div class="stage-col-head">
            <span class="stage-col-title">해야할일</span>
            <button class="stage-col-add" data-add="task" ${adminAttr}>+ 추가</button>
          </div>

async function loadStageData(stageId) {
  try {
    const res = await api('getStageResources', { stageId, categoryId: STATE.currentCategoryId });
    STATE.stageData[stageId] = {
      tasks: res.tasks || [],
      laws:  res.laws  || [],
      docs:  res.docs  || [],
      etcs:  res.etcs  || []
    };
  } catch (e) {
    STATE.stageData[stageId] = { tasks:[], laws:[], docs:[], etcs:[], error: e.message };
  }
}

function renderStageBlock(stageId) {
  const block = document.querySelector(`.stage-block[data-stage-id="${stageId}"]`);
  if (!block) return;
  const data = STATE.stageData[stageId] || { tasks:[], laws:[], docs:[], etcs:[] };
  const adminAttr = STATE.isAdmin ? '' : 'hidden';

  // 해야할일
  block.querySelector('[data-col="task"] .col-body').innerHTML = data.tasks.length === 0
    ? `<div class="col-empty">등록된 할일 없음</div>`
    : data.tasks.map(t => `
        <div class="mini-task ${t.done ? 'done' : ''}" data-id="${t.id}">
          <div class="chk ${t.done ? 'checked' : ''}" data-act="toggle">${t.done ? '✓' : ''}</div>
          <div class="body">
            <div class="content">${escapeHtml(t.content)}</div>
            ${t.note ? `<div class="note">${escapeHtml(t.note)}</div>` : ''}
          </div>
          <button class="del" data-act="delete-task" ${adminAttr}>✕</button>
        </div>
      `).join('');

  // 결재예시·서식
  block.querySelector('[data-col="doc"] .col-body').innerHTML = data.docs.length === 0
    ? `<div class="col-empty">등록된 자료 없음</div>`
    : data.docs.map(d => miniCardHtml(d, 'doc', adminAttr)).join('');

  // 관련법령
  block.querySelector('[data-col="law"] .col-body').innerHTML = data.laws.length === 0
    ? `<div class="col-empty">등록된 자료 없음</div>`
    : data.laws.map(l => miniCardHtml(l, 'law', adminAttr)).join('');

  // 기타
  block.querySelector('[data-col="etc"] .col-body').innerHTML = data.etcs.length === 0
    ? `<div class="col-empty">등록된 자료 없음</div>`
    : data.etcs.map(e => miniCardHtml(e, 'etc', adminAttr)).join('');
}

function miniCardHtml(item, kind, adminAttr) {
  const sub = item.lawName || item.type || item.desc || '';
  return `
    <div class="mini-card" data-id="${item.id}" data-kind="${kind}">
      <div class="title">${escapeHtml(item.title)}</div>
      ${sub ? `<div class="sub">${escapeHtml(sub)}</div>` : ''}
      <div class="foot">
        ${item.fileUrl
          ? `<a href="${escapeHtml(item.fileUrl)}" target="_blank">${escapeHtml(item.fileName || '파일')} ↗</a>`
          : '<span></span>'}
        <button class="mini-del" data-act="delete-mini" ${adminAttr}>삭제</button>
      </div>
    </div>
  `;
}

function bindStageBlockEvents() {
  // 추가 버튼
  document.querySelectorAll('.stage-col-add').forEach(btn => {
    btn.addEventListener('click', () => {
      const stageId = btn.closest('.stage-block').dataset.stageId;
      const kind = btn.dataset.add;
      if (kind === 'task') openAddTaskModal(stageId);
      else if (kind === 'law') openAddLawModal(stageId);
      else if (kind === 'doc') openAddDocModal(stageId);
      else if (kind === 'etc') openAddEtcModal(stageId);
    });
  });

  // 할일 체크 토글
  document.querySelectorAll('.mini-task .chk').forEach(el => {
    el.addEventListener('click', async () => {
      const id = el.closest('.mini-task').dataset.id;
      const stageId = el.closest('.stage-block').dataset.stageId;
      try {
        await api('toggleTaskDone', { id });
        await loadStageData(stageId);
        renderStageBlock(stageId);
        bindStageBlockEvents();
      } catch (e) { toast(e.message); }
    });
  });

  // 할일 삭제
  document.querySelectorAll('.mini-task .del').forEach(el => {
    el.addEventListener('click', async () => {
      if (!confirm('이 할일을 삭제할까요?')) return;
      const id = el.closest('.mini-task').dataset.id;
      const stageId = el.closest('.stage-block').dataset.stageId;
      try {
        await api('deleteTask', { id });
        await loadStageData(stageId);
        renderStageBlock(stageId);
        bindStageBlockEvents();
      } catch (e) { toast(e.message); }
    });
  });

  // 자료 카드 삭제
  document.querySelectorAll('.mini-card .mini-del').forEach(el => {
    el.addEventListener('click', async () => {
      if (!confirm('삭제할까요?')) return;
      const card = el.closest('.mini-card');
      const id = card.dataset.id;
      const kind = card.dataset.kind;
      const stageId = card.closest('.stage-block').dataset.stageId;
      const action = { law:'deleteLaw', doc:'deleteDoc', etc:'deleteEtc' }[kind];
      try {
        await api(action, { id });
        await loadStageData(stageId);
        renderStageBlock(stageId);
        bindStageBlockEvents();
      } catch (e) { toast(e.message); }
    });
  });
}

document.getElementById('manageStageBtn').addEventListener('click', () => {
  if (!STATE.isAdmin) return toast('관리자만 사용 가능합니다.');
  const stages = STATE.stagesByCategory[STATE.currentCategoryId] || [];
  openModal(`
    <h3>단계 관리</h3>
    <div class="sub">이 업무분야의 진행단계를 추가, 삭제, 순서 변경할 수 있습니다.</div>
    <div id="stage-edit-list">
      ${stages.map(s => `
        <div class="stage-edit-row" data-id="${s.id}">
          <input type="text" value="${escapeHtml(s.name)}" data-field="name">
          <button data-action="up">↑</button>
          <button data-action="down">↓</button>
          <button data-action="delete">삭제</button>
        </div>
      `).join('')}
    </div>
    <div class="field" style="margin-top:14px;">
      <label>새 단계 추가</label>
      <div style="display:flex;gap:8px;">
        <input type="text" id="m-new-stage" placeholder="예: 사후관리">
        <button class="btn-secondary" id="m-add-stage" style="flex-shrink:0;">추가</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">닫기</button>
      <button class="btn-primary seal" id="m-save-stages">변경사항 저장</button>
    </div>
  `);

  document.getElementById('m-add-stage').addEventListener('click', async () => {
    const name = document.getElementById('m-new-stage').value.trim();
    if (!name) return toast('단계 이름을 입력해주세요.');
    try {
      await api('addStage', { categoryId: STATE.currentCategoryId, name });
      toast('단계가 추가되었습니다.');
      await refreshStages();
      document.getElementById('manageStageBtn').click();
    } catch (e) { toast(e.message); }
  });

  document.getElementById('stage-edit-list').querySelectorAll('.stage-edit-row').forEach(row => {
    row.querySelector('[data-action="delete"]').addEventListener('click', async () => {
      if (!confirm('이 단계를 삭제할까요? (단계 안의 항목도 더 이상 보이지 않습니다)')) return;
      try {
        await api('deleteStage', { id: row.dataset.id });
        toast('단계가 삭제되었습니다.');
        await refreshStages();
        document.getElementById('manageStageBtn').click();
      } catch (e) { toast(e.message); }
    });
    row.querySelector('[data-action="up"]').addEventListener('click', () => moveStage(row.dataset.id, -1));
    row.querySelector('[data-action="down"]').addEventListener('click', () => moveStage(row.dataset.id, 1));
  });

  document.getElementById('m-save-stages').addEventListener('click', async () => {
    const rows = [...document.getElementById('stage-edit-list').querySelectorAll('.stage-edit-row')];
    for (const row of rows) {
      const newName = row.querySelector('[data-field="name"]').value.trim();
      if (newName) await api('updateStage', { id: row.dataset.id, name: newName });
    }
    closeModal();
    toast('단계 정보가 저장되었습니다.');
    await refreshStages();
  });
});

async function moveStage(id, dir) {
  const stages = [...(STATE.stagesByCategory[STATE.currentCategoryId] || [])];
  const idx = stages.findIndex(s => s.id === id);
  const swapIdx = idx + dir;
  if (swapIdx < 0 || swapIdx >= stages.length) return;
  [stages[idx], stages[swapIdx]] = [stages[swapIdx], stages[idx]];
  await api('reorderStages', { orderedIds: stages.map(s => s.id) });
  await refreshStages();
  document.getElementById('manageStageBtn').click();
}

async function refreshStages() {
  const data = await api('getStages', { categoryId: STATE.currentCategoryId });
  STATE.stagesByCategory[STATE.currentCategoryId] = data.stages;
  renderStageGrid();
}

document.getElementById('aiExtractBtn').addEventListener('click', () => {
  if (!STATE.isAdmin) return toast('관리자만 사용 가능합니다.');
  const stages = STATE.stagesByCategory[STATE.currentCategoryId] || [];
  if (stages.length === 0) return toast('먼저 단계를 등록해주세요.');

  openModal(`

    <div class="field">
      <label>저장할 단계</label>
      <select id="m-stage">
        ${stages.map(s => `<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('')}
      </select>
    </div>
    <div class="field">
      <label>분석할 파일</label>
      <div class="file-drop" id="m-filedrop">파일을 드래그하거나 클릭하여 선택하세요<br><span style="font-size:11px;">(.pdf, .docx, .txt)</span></div>
      <input type="file" id="m-fileinput" accept=".pdf,.docx,.txt,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain" style="display:none;">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn-primary seal" id="m-extract">AI로 추출하기</button>
    </div>
    <div id="m-extract-result"></div>
  `);
  setupFileDrop();
  document.getElementById('m-extract').addEventListener('click', async () => {
    if (!selectedFile) return toast('파일을 선택해주세요.');
    const stageId = document.getElementById('m-stage').value;
    const resultBox = document.getElementById('m-extract-result');
    resultBox.innerHTML = '<div class="loading-text" style="margin-top:14px;"><span class="spinner"></span>파일 업로드 및 AI 분석 중... (최대 1분)</div>';
    try {
      const base64Data = await fileToBase64(selectedFile);
      // POST 호출 (JSONP는 URL 길이 제한으로 파일 송신 불가)
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          action: 'extractTasksFromFile',
          payload: {
            fileName: selectedFile.name,
            mimeType: selectedFile.type || 'application/octet-stream',
            base64Data
          }
        })
      });
      const data = JSON.parse(await res.text());
      if (!data.ok) throw new Error(data.error || '추출 실패');
      const items = data.extracted;
      resultBox.innerHTML = `
        <div style="margin-top:16px;font-size:13px;font-weight:600;">추출된 할일 ${items.length}개 (체크된 항목만 저장됩니다)</div>
        <div class="ai-result-list">
          ${items.map((t, i) => `
            <label class="ai-result-item">
              <input type="checkbox" checked data-idx="${i}">
              <span>${escapeHtml(t.content)}${t.note ? ` <span style="color:var(--muted);">(${escapeHtml(t.note)})</span>` : ''}</span>
            </label>
          `).join('')}
        </div>
        <div class="modal-actions">
          <button class="btn-secondary" onclick="closeModal()">닫기</button>
          <button class="btn-primary seal" id="m-confirm">선택 항목 저장</button>
        </div>
      `;
      document.getElementById('m-confirm').addEventListener('click', async () => {
        const checked = [...resultBox.querySelectorAll('input[type=checkbox]:checked')].map(c => items[c.dataset.idx]);
        if (checked.length === 0) return toast('저장할 항목을 선택해주세요.');
        await api('confirmExtractedTasks', { stageId, tasks: checked });
        closeModal();
        toast(`${checked.length}개의 할일이 저장되었습니다.`);
        await loadStageData(stageId);
        renderStageBlock(stageId);
        bindStageBlockEvents();
      });
    } catch (e) {
      resultBox.innerHTML = `<div style="margin-top:14px;padding:14px;border:1px dashed var(--line);border-radius:8px;color:var(--seal);">${escapeHtml(e.message)}</div>`;
    }
  });
});

    const data = await api('getQna', { categoryId: STATE.currentCategoryId });
    if (data.qna.length === 0) {
      list.innerHTML = '<div style="border:1px dashed var(--line);border-radius:var(--radius);padding:36px 20px;text-align:center;color:var(--muted);">등록된 질문이 없습니다. 첫 질문을 남겨보세요.</div>';
      return;
    }
    list.innerHTML = data.qna.map(q => `
      <div class="qna-card" data-id="${q.id}">
        <div class="qna-q">
          <span class="qna-badge ${q.status === '답변완료' ? 'done' : ''}">${q.status === '답변완료' ? '답변완료' : '대기'}</span>
          <div>
            <div class="qna-qtext">${escapeHtml(q.question)}</div>
            <div class="qna-meta">${escapeHtml(q.asker)} · ${escapeHtml(q.askedAt)}</div>
          </div>
        </div>
        ${q.answer ? `
          <div class="qna-answer">
            <div class="label">답변 · ${escapeHtml(q.answerer)}</div>
            ${escapeHtml(q.answer)}
          </div>
        ` : `
          <div class="qna-answer-form">
            <input type="text" placeholder="답변을 입력하세요" class="qna-answer-input">
            <button class="btn-secondary qna-answer-submit">등록</button>
          </div>
        `}
        ${STATE.isAdmin ? '<div style="margin-top:8px;"><button class="mini-del" data-action="delete">삭제</button></div>' : ''}
      </div>
    `).join('');

    list.querySelectorAll('.qna-answer-submit').forEach(btn => {
      btn.addEventListener('click', async () => {
        const card = btn.closest('.qna-card');
        const answer = card.querySelector('.qna-answer-input').value.trim();
        if (!answer) return toast('답변 내용을 입력해주세요.');
        try {
          await api('addAnswer', { id: card.dataset.id, answer });
          toast('답변이 등록되었습니다.');
          loadQna();
        } catch (e) { toast(e.message); }
      });
    });
    list.querySelectorAll('[data-action="delete"]').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('삭제할까요?')) return;
        try {
          await api('deleteQna', { id: btn.closest('.qna-card').dataset.id });
          loadQna();
        } catch (e) { toast(e.message); }
      });
    });
  } catch (e) {
    list.innerHTML = `<div style="color:var(--seal);">불러오기 실패: ${escapeHtml(e.message)}</div>`;
  }
}

// ===================================================================
// 파일 업로드 공용 (드래그앤드롭 지원)
// ===================================================================
let selectedFile = null;

function setupFileDrop() {
  selectedFile = null;
  const drop = document.getElementById('m-filedrop');
  const input = document.getElementById('m-fileinput');
  if (!drop || !input) return;

  drop.addEventListener('click', () => input.click());
  input.addEventListener('change', () => {
    if (input.files.length > 0) handleSelectedFile(input.files[0]);
  });

  ['dragenter','dragover'].forEach(ev => {
    drop.addEventListener(ev, (e) => {
      e.preventDefault(); e.stopPropagation();
      drop.classList.add('dragover');
    });
  });
  ['dragleave','drop'].forEach(ev => {
    drop.addEventListener(ev, (e) => {
      e.preventDefault(); e.stopPropagation();
      drop.classList.remove('dragover');
    });
  });
  drop.addEventListener('drop', (e) => {
    const files = e.dataTransfer.files;
    if (files && files.length > 0) handleSelectedFile(files[0]);
  });
}

function handleSelectedFile(file) {
  selectedFile = file;
  const drop = document.getElementById('m-filedrop');
  drop.textContent = '✓ ' + file.name + ' (' + Math.round(file.size/1024) + 'KB)';
  drop.classList.add('has-file');
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadIfFileSelected() {
  if (!selectedFile) return null;
  const base64Data = await fileToBase64(selectedFile);
  const cat = STATE.categories.find(c => c.id === STATE.currentCategoryId);
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: 'uploadFile',
        payload: {
          fileName: selectedFile.name,
          mimeType: selectedFile.type || 'application/octet-stream',
          base64Data,
          categoryName: cat ? cat.name : ''
        }
      })
    });
    const data = JSON.parse(await res.text());
    if (!data.ok) throw new Error(data.error || '파일 업로드 실패');
    return data;
  } catch (e) {
    toast('파일 업로드 실패: ' + e.message);
    return null;
  }
}
