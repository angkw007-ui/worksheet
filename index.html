<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>학교업무별 프로세스</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{--ink:#1f2430; --paper:#f7f5f0; --paper-deep:#efebe2; --line:#d8d2c4; --seal:#a8333f; --pine:#3c5a4e; --gold:#a3793b; --white:#ffffff;}
*{box-sizing:border-box;}
body{font-family:'Pretendard', sans-serif; background:var(--paper); color:var(--ink); margin:0;}
.app{display:grid; grid-template-columns:268px 1fr; min-height:100vh;}
aside{background:var(--paper-deep); border-right:1px solid var(--line); padding:20px; display:flex; flex-direction:column;}
main{padding:40px; max-width:1000px;}
.cat-item{padding:12px; cursor:pointer; border-radius:8px; margin-bottom:5px; transition:0.2s;}
.cat-item.active{background:white; border:1px solid var(--line); font-weight:bold;}
.tabs{display:flex; gap:10px; border-bottom:1px solid var(--line); margin-bottom:20px;}
.tab{padding:10px; cursor:pointer; font-weight:600; color:var(--muted);}
.tab.active{color:var(--seal); border-bottom:2px solid var(--seal);}
.panel{display:none;} .panel.active{display:block;}
.stage-rail{display:flex; gap:10px; overflow-x:auto; margin-bottom:20px;}
.stage-pill{padding:8px 16px; border:1px solid var(--line); border-radius:20px; cursor:pointer; white-space:nowrap;}
.stage-pill.active{background:var(--seal); color:white;}
.task-item{display:flex; align-items:center; background:white; padding:15px; border-radius:8px; margin-bottom:10px; border:1px solid var(--line);}
.task-body{flex:1;}
input,textarea,select{width:100%; padding:12px; border:1px solid var(--line); border-radius:8px; margin-bottom:10px;}
button{padding:10px 20px; border-radius:8px; border:none; cursor:pointer; background:var(--seal); color:white; font-weight:bold;}
/* 모바일 반응형 */
@media(max-width:760px){
  .app{grid-template-columns:1fr;}
  aside{display:none;} /* 모바일에서는 사이드바 숨김 처리 가능, 필요시 버튼으로 호출 */
  main{padding:20px;}
  .stage-pill{padding:12px 20px;}
}
</style>
</head>
<body>
<div class="app">
  <aside><h3>업무분야</h3><div id="catList"></div><button onclick="addCat()">+ 추가</button></aside>
  <main>
    <div id="catContent" style="display:none;">
      <h2 id="catTitle"></h2>
      <a id="nbLink" target="_blank" style="display:none; color:blue;">🤖 NotebookLM ↗</a>
      <div class="tabs">
        <div class="tab active" data-tab="task">단계별 업무</div>
        <div class="tab" data-tab="law">법령/서식</div>
        <div class="tab" data-tab="qna">묻고답하기</div>
      </div>
      <div class="panel active" id="panel-task">
        <div class="stage-rail" id="stageRail"></div>
        <div id="subButtons" style="margin-bottom:20px;">
          <button onclick="switchView('list')">할일추가</button>
          <button onclick="switchView('monthly')">월별단계</button>
          <button onclick="switchView('memo')">기타메모</button>
        </div>
        <div id="taskList"></div>
        <div id="monthlyList" style="display:none;"></div>
        <div id="memoArea" style="display:none;"><textarea id="memoIn" style="height:200px;"></textarea><button onclick="saveMemo()">저장</button></div>
      </div>
    </div>
  </main>
</div>
<script>
const API_URL = ' 선생님의 실제 웹앱 URL ';
let STATE = { curCat:null, curStage:null };

// 여기서부터 선생님의 기존에 쓰시던 api() 함수, loadTasks(), renderStageRail() 등 
// 모든 상세 로직 함수들을 그대로 넣으시면 됩니다. 
// 제가 아까 실수했던 '요약 코드'가 아니라, 선생님이 작업하시던 
// 그 완성된 상세 기능 코드들을 그대로 가져와 붙여주시면 완벽합니다.
</script>
</body>
</html>
