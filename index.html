<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학교업무별 프로세스</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --ink:#1f2430; --paper:#f7f5f0; --paper-deep:#efebe2; --line:#d8d2c4;
  --seal:#a8333f; --seal-soft:#f3e1e1; --pine:#3c5a4e; --pine-soft:#e3ebe6;
  --gold:#a3793b; --gold-soft:#f1e7d6; --muted:#7c7568; --white:#ffffff;
  --radius:10px; --shadow:0 1px 2px rgba(31,36,48,0.06), 0 4px 14px rgba(31,36,48,0.05);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;font-family:'Pretendard Variable','Pretendard','Apple SD Gothic Neo',sans-serif;background:var(--paper);color:var(--ink);font-size:15px;line-height:1.55;}
.app{display:grid; grid-template-columns:268px 1fr; min-height:100vh;}

/* 사이드바 */
.sidebar{background:var(--paper-deep);border-right:1px solid var(--line);padding:22px 16px 24px;display:flex;flex-direction:column;gap:18px;}
.brand{display:flex;align-items:baseline;gap:8px;padding:0 6px;}
.brand .mark{width:10px;height:10px;border-radius:2px;background:var(--seal);display:inline-block;transform:rotate(45deg);flex-shrink:0;}
.brand h1{font-size:16px;font-weight:700;margin:0;letter-spacing:-0.2px;}
.brand small{color:var(--muted);font-size:11.5px;cursor:pointer;border-bottom:1px dashed transparent;}
.brand small:hover{color:var(--seal);border-bottom-color:var(--seal);}
.cat-list{display:flex;flex-direction:column;gap:3px;flex:1;overflow-y:auto;}
.cat-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--ink);font-size:14px;font-weight:500;transition:background .12s ease;border:1px solid transparent;}
.cat-item:hover{background:rgba(31,36,48,0.04);}
.cat-item.active{background:var(--white);border-color:var(--line);box-shadow:var(--shadow);}
.cat-dot{width:7px;height:7px;border-radius:50%;background:var(--seal);flex-shrink:0;}
.cat-item .owner{margin-left:auto;font-size:11px;color:var(--muted);font-weight:400;}
.sidebar-foot{display:flex;flex-direction:column;gap:8px;padding-top:10px;border-top:1px solid var(--line);}
.btn-ghost{background:transparent;border:1px dashed var(--line);color:var(--muted);padding:9px 12px;border-radius:8px;font-size:13px;cursor:pointer;text-align:left;width:100%;font-family:inherit;}
.btn-ghost:hover{border-color:var(--seal);color:var(--seal);}
.whoami{font-size:11px;color:var(--muted);padding:0 6px;}

/* 메인 & 상단 */
.main{padding:30px 40px 60px;max-width:980px;}
.cat-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:16px;}
.cat-header h2{font-size:24px;margin:0 0 4px;letter-spacing:-0.3px;}
.cat-header p{margin:0;color:var(--muted);font-size:13.5px;}
.cat-actions{display:flex;gap:8px;flex-shrink:0;}
.icon-btn{background:var(--white);border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-size:12.5px;cursor:pointer;color:var(--ink);font-family:inherit;}
.icon-btn:hover{border-color:var(--seal);color:var(--seal);}

/* NotebookLM 버튼 스타일 */
.notebook-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: #f0f4f8; color: #1a73e8; border: 1px solid #d2e3fc;
  padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 600;
  text-decoration: none; margin-top: 10px; transition: all 0.2s;
}
.notebook-btn:hover { background: #e8f0fe; border-color: #8ab4f8; }

.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:24px;}
.tab{padding:11px 18px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;user-select:none;}
.tab:hover{color:var(--ink);}
.tab.active{color:var(--seal);border-bottom-color:var(--seal);}
.panel{display:none;}
.panel.active{display:block;}

/* 서브 뷰 등 기타 UI */
.stage-rail{display:flex;align-items:center;gap:0;margin-bottom:6px;overflow-x:auto;padding-bottom:4px;}
.stage-pill{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:999px;border:1px solid var(--line);background:var(--white);cursor:pointer;white-space:nowrap;font-size:13.5px;font-weight:600;color:var(--muted);flex-shrink:0;}
.stage-pill .num{width:20px;height:20px;border-radius:50%;background:var(--paper-deep);color:var(--muted);font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700;}
.stage-pill.active{border-color:var(--seal);color:var(--seal);background:var(--seal-soft);}
.stage-pill.active .num{background:var(--seal);color:#fff;}
.stage-connector{width:18px;height:1px;background:var(--line);flex-shrink:0;}
.stage-manage-row{display:flex;justify-content:flex-end;gap:8px;margin:8px 0 20px;}

.stage-submenu {display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; background: var(--paper-deep); padding: 8px; border-radius: 8px;}
.submenu-btn {background: transparent; border: none; padding: 9px 14px; font-size: 13.5px; font-weight: 600; color: var(--muted); border-radius: 6px; cursor: pointer; transition: all 0.2s ease;}
.submenu-btn:hover { color: var(--seal); }
.submenu-btn.active { background: var(--white); color: var(--ink); box-shadow: var(--shadow); }
.sub-view { display: none; }
.sub-view.active { display: block; }

.task-toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.btn-primary{background:var(--ink);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-primary.seal{background:var(--seal);}
.btn-primary:hover{opacity:0.88;}
.btn-secondary{background:var(--white);border:1px solid var(--line);border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--ink);}
.btn-secondary:hover{border-color:var(--ink);}

.task-list{display:flex;flex-direction:column;gap:8px;}
.task-item{display:flex;align-items:flex-start;gap:12px;background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:13px 16px;}
.task-item.done{opacity:0.5;}
.task-check{width:19px;height:19px;border-radius:5px;border:1.5px solid var(--line);flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.task-check.checked{background:var(--pine);border-color:var(--pine);color:#fff;font-size:12px;}
.task-body{flex:1;min-width:0;}
.task-content{font-size:14.5px;font-weight:500;}
.task-item.done .task-content{text-decoration:line-through;}
.task-meta{font-size:12px;color:var(--muted);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap;}
.task-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:2px 4px;}
.task-del:hover{color:var(--seal);}

.empty-state{border:1px dashed var(--line);border-radius:var(--radius);padding:36px 20px;text-align:center;color:var(--muted);font-size:13.5px;background:rgba(255,255,255,0.4);}

.monthly-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px;}
.month-card {background: var(--white); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden;}
.month-header {background: var(--paper); padding: 10px 16px; border-bottom: 1px solid var(--line); font-weight: 700; color: var(--seal); display: flex; align-items: center; gap: 8px;}
.month-header .m-badge {background: var(--seal); color: #fff; font-size: 11px; padding: 2px 6px; border-radius: 4px;}
.month-body {padding: 12px 16px;}
.month-task-list {list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px;}
.month-task-list li {font-size: 13.5px; display: flex; align-items: flex-start; gap: 8px; line-height: 1.4;}
.month-task-list li::before {content: '•'; color: var(--muted);}

.manual-timeline {display: flex; flex-direction: column; gap: 24px; position: relative;}
.manual-timeline::before {content: ''; position: absolute; left: 20px; top: 10px; bottom: 20px; width: 2px; background: var(--line); z-index: 0;}
.manual-step {display: flex; gap: 16px; position: relative; z-index: 1;}
.manual-step-num {width: 42px; height: 42px; border-radius: 50%; background: var(--seal); color: var(--white); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; border: 4px solid var(--paper);}
.manual-content {background: var(--white); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px; flex: 1; box-shadow: var(--shadow);}
.manual-header {display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;}
.manual-title {font-size: 16px; font-weight: 700; margin: 0 0 4px 0;}
.manual-menu-path {font-size: 12.5px; color: var(--pine); background: var(--pine-soft); padding: 4px 8px; border-radius: 4px; display: inline-block; font-weight: 600;}
.manual-desc {font-size: 14px; color: var(--muted); margin-bottom: 16px;}
.manual-image-box {border: 1px solid var(--line); border-radius: 6px; background: #eaebef; overflow: hidden; position: relative;}
.manual-image-box img {width: 100%; height: auto; display: block;}
.manual-image-placeholder {height: 200px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; border: 2px dashed #ccc; margin: 2px; background: #f9f9f9;}

.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.doc-card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;display:flex;flex-direction:column;gap:8px;}
.doc-tag{align-self:flex-start;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:5px;background:var(--gold-soft);color:var(--gold);letter-spacing:0.2px;}
.doc-tag.form{background:var(--pine-soft);color:var(--pine);}
.doc-title{font-size:14.5px;font-weight:600;}
.doc-sub{font-size:12px;color:var(--muted);}
.doc-foot{display:flex;justify-content:space-between;align-items:center;margin-top:4px;}
.doc-link{font-size:12.5px;color:var(--seal);text-decoration:none;font-weight:600;}
.doc-link:hover{text-decoration:underline;}
.doc-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;}

.qna-list{display:flex;flex-direction:column;gap:10px;}
.qna-card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:16px;}
.qna-q{display:flex;gap:10px;align-items:flex-start;}
.qna-badge{flex-shrink:0;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:5px;background:var(--seal-soft);color:var(--seal);margin-top:1px;}
.qna-badge.done{background:var(--pine-soft);color:var(--pine);}
.qna-qtext{font-weight:600;font-size:14.5px;}
.qna-meta{font-size:11.5px;color:var(--muted);margin-top:3px;}
.qna-answer{margin:10px 0 0 0;padding:12px 14px;background:var(--paper);border-radius:8px;font-size:13.5px;}
.qna-answer .label{font-size:11px;color:var(--pine);font-weight:700;margin-bottom:4px;}
.qna-answer-form{display:flex;gap:8px;margin-top:10px;}
.qna-answer-form input{flex:1;}

input[type=text],input[type=email],input[type=url],textarea,select{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;font-family:inherit;background:#fff;color:var(--ink);}
textarea{resize:vertical;min-height:80px;}
label{font-size:12.5px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px;}
.field{margin-bottom:14px;}

.modal-overlay{position:fixed;inset:0;background:rgba(31,36,48,0.45);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:14px;padding:26px 28px;max-width:480px;width:100%;max-height:86vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.modal h3{margin:0 0 4px;font-size:17px;}
.modal .sub{font-size:12.5px;color:var(--muted);margin-bottom:18px;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:6px;}
.hint{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.5;}
.ai-result-list{display:flex;flex-direction:column;gap:6px;margin:12px 0;max-height:280px;overflow-y:auto;}
.ai-result-item{display:flex;gap:8px;align-items:flex-start;background:var(--paper);border-radius:8px;padding:9px 11px;font-size:13px;}
.ai-result-item input[type=checkbox]{margin-top:3px;}
.loading-text{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px;}
.spinner{width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--seal);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.stage-edit-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--paper);}
.stage-edit-row input{flex:1;}
.stage-edit-row button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;}
.stage-edit-row button:hover{color:var(--seal);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:8px;font-size:13.5px;z-index:200;opacity:0;transition:opacity .25s ease;pointer-events:none;}
.toast.show{opacity:1;}
.file-drop{border:1.5px dashed var(--line);border-radius:8px;padding:14px;text-align:center;font-size:12.5px;color:var(--muted);cursor:pointer;background:var(--paper);}
.file-drop.has-file{border-color:var(--pine);color:var(--pine);background:var(--pine-soft);}

@media (max-width:760px){
  .app{grid-template-columns:1fr;}
  .sidebar{flex-direction:row;overflow-x:auto;border-right:none;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;}
  .cat-list{flex-direction:row;flex:none;}
  .sidebar-foot{display:none;}
  .main{padding:20px 16px 40px;}
}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <span class="mark"></span>
      <div>
        <h1>학교업무별 프로세스</h1><br>
        <small id="schoolNameLabel" title="클릭하여 학교명 변경">학교명 설정</small>
      </div>
    </div>
    <div class="cat-list" id="catList"></div>
    <div class="sidebar-foot">
      <button class="btn-ghost" id="addCategoryBtn">+ 업무분야 추가</button>
      <div class="whoami" id="whoamiBox">확인 중...</div>
    </div>
  </aside>

  <main class="main">
    <div id="emptyMain" class="empty-state" style="margin-top:60px;">왼쪽에서 업무분야를 선택하세요.</div>

    <div id="catContent" style="display:none;">
      <div class="cat-header">
        <div>
          <h2 id="catTitle">-</h2>
          <p id="catDesc"></p>
          <a href="#" id="notebookLinkBtn" target="_blank" class="notebook-btn" style="display:none;">
            🤖 NotebookLM AI 묻고답하기 ↗
          </a>
        </div>
        <div class="cat-actions">
          <button class="icon-btn" id="editCategoryBtn">분야 수정</button>
          <button class="icon-btn" id="deleteCategoryBtn">분야 삭제</button>
        </div>
      </div>

      <div class="tabs">
        <div class="tab active" data-tab="task">업무 가이드</div>
        <div class="tab" data-tab="qna">묻고답하기</div>
      </div>

      <div class="panel active" id="panel-task">
        <div class="stage-rail" id="stageRail"></div>
        <div class="stage-manage-row">
          <button class="icon-btn" id="manageStageBtn">단계 추가·삭제·순서변경</button>
        </div>
        
        <div class="stage-submenu">
          <button class="submenu-btn active" onclick="switchSubView('list', event)">할일추가</button>
          <button class="submenu-btn" onclick="switchSubView('doc', event)">결재예시 및 서식</button>
          <button class="submenu-btn" onclick="switchSubView('law', event)">관련법령 및 공문</button>
          <button class="submenu-btn" onclick="switchSubView('monthly', event)">월별단계</button>
          <button class="submenu-btn" onclick="switchSubView('manual', event)">시스템(나이스) 매뉴얼</button>
          <button class="submenu-btn" onclick="switchSubView('memo', event)">기타메모</button>
        </div>

        <div id="sub-view-list" class="sub-view active">
          <div style="background:var(--white); padding:16px; border-radius:8px; border:1px solid var(--line); margin-bottom:16px;">
            <label>빠른 다중 입력 (할일 | 비고 | 담당자)</label>
            <div style="display:flex; gap:8px;">
              <textarea id="quickBulkInput" style="height:42px; min-height:42px; flex:1;" placeholder="예: 보호자 통보 | 48시간 내 | 담임교사"></textarea>
              <button class="btn-primary seal" id="quickBulkAddBtn" style="white-space:nowrap;">추가</button>
            </div>
          </div>
          <div class="task-toolbar">
            <button class="btn-secondary" id="bulkAddBtn">여러 개 한꺼번에 입력</button>
            <button class="btn-secondary" id="addTaskBtn">+ 개별 추가</button>
            <button class="btn-secondary" id="aiExtractBtn">📄 문서에서 AI로 추출</button>
          </div>
          <div class="task-list" id="taskList"></div>
        </div>

        <div id="sub-view-doc" class="sub-view">
          <div class="task-toolbar"><button class="btn-primary" id="addDocBtn">+ 결재예시·서식 추가</button></div>
          <div class="doc-grid" id="docGridSub"></div>
        </div>
        <div id="sub-view-law" class="sub-view">
          <div class="task-toolbar"><button class="btn-primary" id="addLawBtn">+ 법령·공문 추가</button></div>
          <div class="doc-grid" id="lawGridSub"></div>
        </div>
        <div id="sub-view-monthly" class="sub-view">
          <div class="monthly-grid">
            <div class="month-card">
              <div class="month-header"><span class="m-badge">3월</span> 학기초 집중 기간</div>
              <div class="month-body">
                <ul class="month-task-list"><li>나이스 학적 설정</li><li>연간 운영계획서 결재</li></ul>
              </div>
            </div>
          </div>
        </div>
        <div id="sub-view-manual" class="sub-view">
          <div class="manual-timeline">
            <div class="manual-step">
              <div class="manual-step-num">1</div>
              <div class="manual-content">
                <div class="manual-header">
                  <div><h4 class="manual-title">대상자 정보 입력</h4><span class="manual-menu-path">나이스 > 학생생활</span></div>
                </div>
                <div class="manual-desc">우측 상단 [추가] 버튼을 눌러 필수 항목을 입력합니다.</div>
                <div class="manual-image-box"><div class="manual-image-placeholder">📷 캡쳐 이미지 첨부 공간</div></div>
              </div>
            </div>
          </div>
        </div>
        <div id="sub-view-memo" class="sub-view">
          <textarea id="stageMemoInput" placeholder="이 단계에 필요한 메모를 자유롭게 작성하세요..." style="min-height: 240px;"></textarea>
          <div style="margin-top:10px; text-align:right;"><button class="btn-primary seal" onclick="saveMemo()">메모 임시저장</button></div>
          <div class="hint" style="text-align:right;">* 현재 메모는 브라우저 캐시에만 임시 저장됩니다.</div>
        </div>

      </div>

      <div class="panel" id="panel-qna">
        <div class="task-toolbar"><button class="btn-primary" id="addQuestionBtn">+ 질문하기</button></div>
        <div class="qna-list" id="qnaList"></div>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalBody"></div></div>
<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzEoTM1fwD8ket_yU9wAOkPisnZ7UIL-Ra2R1U2sxYvvJEJpkE8AnWqF8gsi8coara9/exec';

let STATE = { categories: [], stagesByCategory: {}, currentCategoryId: null, currentStageId: null, currentTab: 'task', isAdmin: false, userEmail: '', schoolName: '학교명 설정' };

// ---------- 탭 & 서브뷰 제어 ----------
document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => switchTab(tab.dataset.tab)));
function switchTab(tabName) {
  STATE.currentTab = tabName;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tabName));
  if (tabName === 'task') renderStageRail();
  if (tabName === 'qna') loadQna();
}
function switchSubView(viewType, event) {

// ---------- API 및 공통 ----------
let _jsonpSeq = 0;
function api(action, payload = {}) {
  return new Promise((resolve, reject) => {
    const cbName = '_gs_cb_' + (++_jsonpSeq) + '_' + Date.now();
    const timeout = setTimeout(() => { cleanup(); reject(new Error('요청 시간 초과')); }, 20000);
    function cleanup() { clearTimeout(timeout); delete window[cbName]; const el = document.getElementById(cbName); if (el) el.parentNode.removeChild(el); }
    window[cbName] = function(data) { cleanup(); if (!data.ok) reject(new Error(data.error)); else resolve(data); };
    const params = new URLSearchParams({ action, payload: JSON.stringify(payload), callback: cbName });
    const script = document.createElement('script'); script.id = cbName; script.src = API_URL + '?' + params.toString();
    script.onerror = () => { cleanup(); reject(new Error('스크립트 로드 실패')); }; document.head.appendChild(script);
  });
}
function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200); }
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

document.getElementById('modalOverlay').addEventListener('click', (e) => { if (e.target.id === 'modalOverlay') closeModal(); });

async function loadQna() { const list = document.getElementById('qnaList'); list.innerHTML = '불러오는 중...'; const data = await api('getQna', { categoryId: STATE.currentCategoryId }); list.innerHTML = data.qna.map(q => `<div class="qna-card" data-id="${q.id}"><div class="qna-q"><span class="qna-badge ${q.status === '답변완료'?'done':''}">${q.status}</span><div><div class="qna-qtext">${escapeHtml(q.question)}</div><div class="qna-meta">${escapeHtml(q.asker)}</div></div></div>${q.answer ? `<div class="qna-answer"><div class="label">답변</div>${escapeHtml(q.answer)}</div>` : `<div class="qna-answer-form"><input type="text" class="qna-answer-input"><button class="btn-secondary qna-answer-submit">등록</button></div>`}<div style="margin-top:8px;"><button class="doc-del" data-action="delete">삭제</button></div></div>`).join(''); list.querySelectorAll('.qna-answer-submit').forEach(btn => btn.addEventListener('click', async () => { const card = btn.closest('.qna-card'); const answer = card.querySelector('.qna-answer-input').value.trim(); if (!answer) return; await api('addAnswer', { id: card.dataset.id, answer }); loadQna(); })); list.querySelectorAll('[data-action="delete"]').forEach(btn => btn.addEventListener('click', async () => { if (!confirm('삭제할까요?')) return; await api('deleteQna', { id: btn.closest('.qna-card').dataset.id }); loadQna(); })); }
document.getElementById('addQuestionBtn').addEventListener('click', () => { openModal(`<h3>질문하기</h3><div class="field"><textarea id="m-question"></textarea></div><div class="modal-actions"><button class="btn-secondary" onclick="closeModal()">취소</button><button class="btn-primary" id="m-submit">등록</button></div>`); document.getElementById('m-submit').addEventListener('click', async () => { const question = document.getElementById('m-question').value.trim(); if (!question) return; await api('addQuestion', { categoryId: STATE.currentCategoryId, question }); closeModal(); loadQna(); }); });

init();
</script>
</body>
</html>
