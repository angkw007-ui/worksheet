<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>학교업무별 프로세스</title>
<style>
:root{--ink:#1f2430; --paper:#f7f5f0; --seal:#a8333f; --line:#d8d2c4;}
body{margin:0; font-family:sans-serif; background:var(--paper); color:var(--ink);}
.app{display:grid; grid-template-columns: 260px 1fr; min-height:100vh;}
aside{background:#efebe2; border-right:1px solid var(--line); padding:20px;}
main{padding:40px;}
.cat-item{padding:12px; cursor:pointer; border-radius:8px; margin-bottom:5px; border:1px solid transparent;}
.cat-item.active{background:white; border-color:var(--line);}
.panel{display:none;} .panel.active{display:block;}
.stage-rail{display:flex; gap:10px; margin-bottom:20px; overflow-x:auto;}
.stage-pill{padding:8px 16px; border:1px solid var(--line); border-radius:20px; cursor:pointer; white-space:nowrap;}
.stage-pill.active{background:var(--seal); color:white;}
.sub-view{display:none;} .sub-view.active{display:block;}
.task-item{display:flex; align-items:center; background:white; padding:15px; border-radius:8px; margin-bottom:10px; border:1px solid var(--line);}
textarea{width:100%; padding:10px; border:1px solid var(--line); border-radius:8px; margin-bottom:10px;}
button{padding:10px 20px; border-radius:8px; border:none; cursor:pointer; background:var(--seal); color:white;}
@media(max-width:760px){ .app{grid-template-columns:1fr;} aside{display:none;} main{padding:20px;} }
</style>
</head>
<body>
<div class="app">
  <aside><h3>업무분야</h3><div id="catList"></div><button onclick="addCat()">+ 추가</button></aside>
  <main>
    <div id="catTitle">업무를 선택하세요</div>
    <a id="nbLink" target="_blank" style="display:none; color:blue;">🤖 NotebookLM ↗</a>
    <div id="stageRail"></div>
    <div id="subViews">
      <div id="sub-view-list" class="sub-view active">
        <textarea id="bulkIn" placeholder="할일 | 비고 | 담당자"></textarea><button id="bulkAdd">추가</button>
        <div id="taskList"></div>
      </div>
      <div id="sub-view-memo" class="sub-view">
        <textarea id="memoIn" style="height:200px;"></textarea><button onclick="saveMemo()">저장</button>
      </div>
    </div>
  </main>
</div>
<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbw0Zq0j-i6DaEIPzFnG6vpN_FCX-MCMgMrp5aatXMrwmB3LymQEXvu1kxKq1tAFSYkp/exec';
let STATE = { curCat: null, curStage: null };

async function api(action, payload={}) {
  const cb = 'cb_' + Date.now();
  return new Promise(r => {
    window[cb] = (data) => { delete window[cb]; r(data); };
    const s = document.createElement('script');
    s.src = `${API_URL}?action=${action}&payload=${JSON.stringify(payload)}&callback=${cb}`;
    document.head.appendChild(s);
  });
}

async function init() {
  const data = await api('getAll');
  data.categories.forEach(c => {
    const div = document.createElement('div');
    div.className = 'cat-item'; div.textContent = c.name;
    div.onclick = () => selectCat(c);
    document.getElementById('catList').appendChild(div);
  });
}

function selectCat(c) {
  STATE.curCat = c;
  document.getElementById('catTitle').textContent = c.name;
  const nb = document.getElementById('nbLink');
  if(c.notebookLink) { nb.style.display='block'; nb.href=c.notebookLink; }
  else nb.style.display='none';
}

async function saveMemo() {
  await api('saveMemo', {stageId: STATE.curStage, content: document.getElementById('memoIn').value});
  alert('저장됨');
}

init();
</script>
</body>
</html>
